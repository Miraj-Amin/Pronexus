<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Phoenix — Project Update</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
<style>
deck-stage:not(:defined){visibility:hidden}
*,*::before,*::after{box-sizing:border-box;}
:root{--navy:#0d1f33;--cyan:#2dd4ff;--cyan2:#1fc0e8;--ok:#37e0b0;--amber:#ffba45;--red:#ff5a5a;--ink:#eef6fd;--ink2:#c4ddf1;--muted:#93b4ce;--border:#173251;--border2:#21466d;--sur:#0a1626;--sur2:#0d1d31;--sur3:#102842;--sans:'IBM Plex Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;--serif:'Newsreader',Georgia,serif;}
section{font-family:var(--sans);background:var(--navy);color:var(--ink);position:relative;overflow:hidden;}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;}
.glow{position:absolute;border-radius:50%;pointer-events:none;background:radial-gradient(circle,rgba(45,212,255,.15),transparent 62%);}
.pad{padding:80px 100px;position:relative;z-index:1;height:100%;display:flex;flex-direction:column;}
.eyebrow{font-family:var(--mono);font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--cyan);margin-bottom:14px;}
.slide-title{font-family:var(--serif);font-weight:500;font-size:62px;line-height:1.05;letter-spacing:-.5px;margin:0 0 8px;}
.sec-rule{height:2px;width:120px;background:var(--cyan);margin-bottom:36px;border-radius:2px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:40px;flex:1;}
.slide-num{position:absolute;bottom:40px;right:60px;font-family:var(--mono);font-size:13px;color:rgba(255,255,255,.25);letter-spacing:2px;}
.ck{background:rgba(13,31,51,.7);border:1px solid var(--border);padding:20px 24px;border-radius:4px;}
.ck .cl{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);}
.ck .cv{font-family:var(--mono);font-size:32px;font-weight:500;color:var(--ink);margin-top:8px;letter-spacing:-.4px;}
.ck .cv.ok{color:var(--ok);}.ck .cv.amber{color:var(--amber);}.ck .cv.red{color:var(--red);}
.tl-spine{position:absolute;left:0;top:10px;bottom:10px;width:2px;background:linear-gradient(180deg,var(--cyan),rgba(45,212,255,.2));}
.tl-item{display:grid;grid-template-columns:28px 1fr;gap:20px;padding:14px 0;}
.tl-dot{width:20px;height:20px;border-radius:50%;flex:none;display:grid;place-items:center;margin-top:2px;border:2px solid;position:relative;z-index:1;background:var(--navy);}
.tl-dot.done{background:var(--ok);border-color:var(--ok);box-shadow:0 0 8px var(--ok);}
.tl-dot.active{background:var(--amber);border-color:var(--amber);box-shadow:0 0 8px var(--amber);}
.tl-dot.future{border-color:var(--border2);}
.tl-title{font-size:17px;font-weight:600;color:var(--ink);}
.tl-meta{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:3px;}
.tlabel{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 8px;border-radius:2px;margin-left:10px;}
.tlabel.done{background:rgba(55,224,176,.12);color:var(--ok);}
.tlabel.active{background:rgba(255,186,69,.12);color:var(--amber);}
.tlabel.future{background:rgba(255,255,255,.05);color:var(--muted);}
.btbl{width:100%;border-collapse:collapse;font-size:15px;}
.btbl th{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:600;padding:9px 12px;border-bottom:1px solid var(--border2);text-align:left;}
.btbl th.r{text-align:right;}
.btbl td{padding:11px 12px;border-bottom:1px solid var(--border);color:var(--ink2);}
.btbl td.r{text-align:right;font-family:var(--mono);}
.btbl tr.total td{font-weight:700;font-family:var(--mono);color:var(--ink);background:var(--sur2);border-top:1px solid var(--border2);}
.action{display:grid;grid-template-columns:36px 1fr auto;align-items:start;gap:14px;padding:14px 16px;border:1px solid var(--border);border-radius:4px;background:var(--sur2);}
.action.high{border-left:3px solid var(--red);}
.action.med{border-left:3px solid var(--amber);}
.action.low{border-left:3px solid var(--ok);}
.action-n{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--muted);margin-top:1px;}
.action-body h4{margin:0 0 4px;font-size:16px;font-weight:600;color:var(--ink);}
.action-body p{margin:0;font-size:13px;color:var(--muted);}
.a-badge{font-family:var(--mono);font-size:9px;font-weight:600;padding:2px 7px;border-radius:2px;display:block;margin-bottom:4px;}
.a-badge.high{background:rgba(255,90,90,.12);color:var(--red);}
.a-badge.med{background:rgba(255,186,69,.12);color:var(--amber);}
.a-badge.low{background:rgba(55,224,176,.1);color:var(--ok);}
.a-due{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap;}

/* config */
.cfg-tab{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:300;background:var(--sur);border:1px solid var(--border);border-right:none;border-radius:4px 0 0 4px;padding:12px 6px;cursor:pointer;writing-mode:vertical-lr;font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);transition:all .14s;}
.cfg-tab:hover{color:var(--cyan);border-color:var(--cyan);}
.cfg-panel{position:fixed;right:0;top:0;bottom:0;width:340px;background:var(--sur);border-left:1px solid var(--border2);z-index:301;transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column;box-shadow:-8px 0 32px rgba(0,0,0,.5);}
.cfg-panel.open{transform:translateX(0);}
.cfg-head{padding:15px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex:none;}
.cfg-head h3{margin:0;font-family:var(--mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--ink);}
.cfg-x{width:26px;height:26px;display:grid;place-items:center;border:1px solid var(--border);border-radius:4px;background:var(--sur2);color:var(--muted);cursor:pointer;font-size:16px;}
.cfg-x:hover{border-color:var(--red);color:var(--red);}
.cfg-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.cfg-body::-webkit-scrollbar{width:4px;}
.cfg-body::-webkit-scrollbar-thumb{background:var(--border2);}
.cfg-sec{font-family:var(--mono);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--cyan);padding:6px 0;border-bottom:1px solid var(--border);margin-top:6px;}
.cfg-f{display:flex;flex-direction:column;gap:4px;}
.cfg-f label{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);}
.cfg-f input,.cfg-f select,.cfg-f textarea{background:var(--sur2);border:1px solid var(--border2);color:var(--ink);font-family:var(--mono);font-size:12px;padding:6px 8px;border-radius:3px;width:100%;}
.cfg-f input:focus,.cfg-f textarea:focus{outline:none;border-color:var(--cyan);}
.cfg-f textarea{resize:vertical;min-height:56px;font-family:var(--sans);font-size:12px;line-height:1.5;}
.cfg-foot{padding:12px 16px;border-top:1px solid var(--border);flex:none;}
.cfg-save{width:100%;padding:10px;background:var(--cyan2);border:none;color:#04141c;font-family:var(--mono);font-size:12px;font-weight:700;border-radius:3px;cursor:pointer;}
.cfg-save:hover{background:var(--cyan);}
</style>
</head>
<body>
<div class="cfg-tab" onclick="toggleCfg()">⚙ Edit Data</div>
<div class="cfg-panel" id="cfg">
  <div class="cfg-head"><h3>Project Data</h3><div class="cfg-x" onclick="toggleCfg()">×</div></div>
  <div class="cfg-body" id="cfg-body"></div>
  <div class="cfg-foot"><button class="cfg-save" onclick="saveCfg()">Save &amp; Update</button></div>
</div>

<deck-stage id="deck" width="1920" height="1080"></deck-stage>

<script>
const STORE = 'phx_update';
const DEFAULTS = {
  name:'Your Scheme', address:'Town, County', units:'', updateMonth:'1', totalMonths:'24', date:'',
  progStatus:'On Track', budgetStatus:'On Budget', salesStatus:'On Track', riskLevel:'Low',
  spendToDate:'', totalBudget:'', forecastMargin:'', forecastProfit:'', vsOriginal:'',
  startDate:'', targetEnd:'', unitsSold:'0', unitsReserved:'0', totalUnits:'0',
  avgSalePrice:'', avgPsf:'', budgetPsf:'', absorptionRate:'',
  // milestones
  ms1title:'Exchange of contracts', ms1date:'', ms1status:'done',
  ms2title:'Construction start', ms2date:'', ms2status:'done',
  ms3title:'Show home open', ms3date:'', ms3status:'done',
  ms4title:'Phase 1 completions', ms4date:'', ms4status:'active',
  ms5title:'Phase 2 completions', ms5date:'', ms5status:'future',
  ms6title:'Practical completion', ms6date:'', ms6status:'future',
  // budget table (6 categories)
  bc1label:'Land & acquisition', bc1budget:'', bc1spent:'', bc1forecast:'', bc1note:'On Budget',
  bc2label:'Construction', bc2budget:'', bc2spent:'', bc2forecast:'', bc2note:'On Budget',
  bc3label:'Professional fees', bc3budget:'', bc3spent:'', bc3forecast:'', bc3note:'On Budget',
  bc4label:'Finance', bc4budget:'', bc4spent:'', bc4forecast:'', bc4note:'On Budget',
  bc5label:'Sales & marketing', bc5budget:'', bc5spent:'', bc5forecast:'', bc5note:'On Budget',
  bc6label:'Contingency', bc6budget:'', bc6spent:'', bc6forecast:'', bc6note:'On Budget',
  // watch points
  watchPoint:'', positive:'',
  salesNote:'', salesWatch:'',
  // actions
  a1title:'', a1desc:'', a1pri:'high', a1due:'',
  a2title:'', a2desc:'', a2pri:'med', a2due:'',
  a3title:'', a3desc:'', a3pri:'low', a3due:'',
  a4title:'', a4desc:'', a4pri:'low', a4due:'',
  nextUpdate:''
};

let C = {...DEFAULTS, ...JSON.parse(localStorage.getItem(STORE)||'{}')};
const fm = n => { const v=parseFloat(n); return v?'£'+v.toFixed(2)+'m':'—'; };
const fp = n => { const v=parseFloat(n); return v?v.toFixed(1)+'%':'—'; };
const or = (v,fb='—') => v||fb;
const LOGO = `<svg width="34" height="34" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="5" r="2.4" fill="#2dd4ff"/><circle cx="5" cy="17" r="2.4" fill="#9fb2c4"/><circle cx="19" cy="17" r="2.4" fill="#9fb2c4"/><path d="M12 7L5.5 15.2M12 7l6.5 8.2M6.8 17h10.4" stroke="#56768f" stroke-width="1.5"/></svg>`;
const sevColor = s => s==='On Track'?'var(--ok)':s==='Delayed'?'var(--red)':'var(--amber)';
const noteColor = s => s==='On Budget'||s==='Under'?'var(--ok)':s==='Over'?'var(--red)':'var(--amber)';

function unitBar(sold, reserved, total) {
  const n = parseInt(total)||0;
  if(!n) return '';
  const s=parseInt(sold)||0, r=parseInt(reserved)||0, av=n-s-r;
  const boxes = Array.from({length:Math.min(n,30)}).map((_,i)=>{
    const cls = i<s?'sold':i<s+r?'res':'avail';
    const bg = cls==='sold'?'rgba(55,224,176,.2)':cls==='res'?'rgba(45,212,255,.15)':'#0d1d31';
    const bc = cls==='sold'?'rgba(55,224,176,.4)':cls==='res'?'rgba(45,212,255,.35)':'#173251';
    const col = cls==='sold'?'var(--ok)':cls==='res'?'var(--cyan)':'var(--muted)';
    return `<div style="width:100%;aspect-ratio:1;border-radius:3px;display:grid;place-items:center;font-family:var(--mono);font-size:9px;font-weight:700;background:${bg};border:1px solid ${bc};color:${col}">${i+1}</div>`;
  }).join('');
  return `<div style="display:grid;grid-template-columns:repeat(10,1fr);gap:5px;margin:14px 0;">${boxes}</div>
  <div style="display:flex;gap:16px;font-family:var(--mono);font-size:11px;"><span style="color:var(--ok)">■ Exchanged (${s})</span><span style="color:var(--cyan)">■ Reserved (${r})</span><span style="color:var(--muted)">■ Available (${av})</span></div>`;
}

function buildSlides(c) {
  const name = or(c.name,'Your Scheme');
  const milestones = [1,2,3,4,5,6].map(i=>`<div class="tl-item"><div class="tl-dot ${c['ms'+i+'status']||'future'}"></div><div><div class="tl-title">${or(c['ms'+i+'title'],'—')}<span class="tlabel ${c['ms'+i+'status']||'future'}">${c['ms'+i+'status']||'Future'}</span></div><div class="tl-meta">${or(c['ms'+i+'date'],'Date TBC')}</div></div></div>`).join('');
  const budgetRows = [1,2,3,4,5,6].map(i=>{
    const b=parseFloat(c['bc'+i+'budget'])||0, sp=parseFloat(c['bc'+i+'spent'])||0, fo=parseFloat(c['bc'+i+'forecast'])||0;
    const note=c['bc'+i+'note']||'—';
    return `<tr><td>${c['bc'+i+'label']||'—'}</td><td class="r">${b?b.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,','):'—'}</td><td class="r">${sp?sp.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,','):'—'}</td><td class="r">${fo?fo.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,','):'—'}</td><td><span style="font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:2px;background:rgba(55,224,176,.1);color:${noteColor(note)}">${note}</span></td></tr>`;
  }).join('');
  const actions = [1,2,3,4].filter(i=>c['a'+i+'title']).map(i=>`
    <div class="action ${c['a'+i+'pri']}">
      <div class="action-n">0${i}</div>
      <div class="action-body"><h4>${c['a'+i+'title']}</h4><p>${c['a'+i+'desc']||''}</p></div>
      <div><div class="a-badge ${c['a'+i+'pri']}">${(c['a'+i+'pri']||'').toUpperCase()}</div><div class="a-due">${c['a'+i+'due']||''}</div></div>
    </div>`).join('');

  return `
<!-- 01 Cover -->
<section data-screen-label="01 Cover">
  <div class="grid-bg"></div>
  <div class="glow" style="top:-200px;right:-200px;width:600px;height:600px;"></div>
  <div class="pad" style="justify-content:space-between;">
    <div style="display:flex;align-items:center;gap:14px;">${LOGO}<span style="font-family:var(--mono);font-weight:600;letter-spacing:4px;font-size:20px;">PHOENIX</span><span style="margin-left:auto;font-family:var(--mono);font-size:11px;letter-spacing:2px;color:#8fd9ee;border:1px solid rgba(143,217,238,.35);padding:4px 12px;border-radius:2px;">PROJECT UPDATE</span></div>
    <div>
      <div style="display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:6px 14px;border:1px solid rgba(255,186,69,.4);border-radius:2px;color:var(--amber);background:rgba(255,186,69,.06);margin-bottom:28px;">Programme — Month ${or(c.updateMonth,'—')} of ${or(c.totalMonths,'—')}</div>
      <div style="font-family:var(--serif);font-size:90px;font-weight:500;line-height:1.0;color:#fff;letter-spacing:-.8px;margin:0 0 16px;">${name}</div>
      <div style="font-size:22px;color:#aebfcf;">${or(c.address,'—')} · ${or(c.units,'—')} units · ${or(c.date,'update date')}</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;">
      <div class="ck"><div class="cl">Programme</div><div class="cv" style="color:${sevColor(c.progStatus)}">${or(c.progStatus,'—')}</div></div>
      <div class="ck"><div class="cl">Spend to Date</div><div class="cv">${fm(c.spendToDate)}</div></div>
      <div class="ck"><div class="cl">Units Reserved</div><div class="cv ok">${or(c.unitsSold,'0')} sold · ${or(c.unitsReserved,'0')} res.</div></div>
      <div class="ck"><div class="cl">Forecast Margin</div><div class="cv ok">${fp(c.forecastMargin)}</div></div>
    </div>
  </div>
  <div class="slide-num">01 / 05</div>
</section>

<!-- 02 Programme -->
<section data-screen-label="02 Programme">
  <div class="grid-bg"></div>
  <div class="glow" style="bottom:-200px;left:-150px;width:500px;height:500px;opacity:.6;"></div>
  <div class="pad">
    <div class="eyebrow">Programme Update</div>
    <div class="slide-title">Milestones</div>
    <div class="sec-rule"></div>
    <div class="two-col">
      <div style="position:relative;padding-left:30px;">
        <div class="tl-spine"></div>
        ${milestones}
      </div>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="background:var(--sur2);border:1px solid var(--border);border-radius:4px;padding:20px 22px;">
          <div style="font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:12px;">Programme summary</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
            <div><div style="font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;">Start date</div><div style="font-family:var(--mono);font-size:16px;color:var(--ink);">${or(c.startDate,'—')}</div></div>
            <div><div style="font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;">Target end</div><div style="font-family:var(--mono);font-size:16px;color:var(--ink);">${or(c.targetEnd,'—')}</div></div>
            <div><div style="font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;">Programme</div><div style="font-family:var(--mono);font-size:16px;color:var(--ink);">${or(c.totalMonths,'—')} months</div></div>
            <div><div style="font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;">Current month</div><div style="font-family:var(--mono);font-size:16px;color:var(--amber);">${or(c.updateMonth,'—')} of ${or(c.totalMonths,'—')}</div></div>
          </div>
        </div>
        ${c.watchPoint?`<div style="background:rgba(255,186,69,.06);border:1px solid rgba(255,186,69,.3);border-left:3px solid var(--amber);border-radius:4px;padding:16px 18px;"><div style="font-family:var(--mono);font-size:11px;color:var(--amber);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;">Watch point</div><div style="font-size:15px;color:var(--ink2);">${c.watchPoint}</div></div>`:''}
        ${c.positive?`<div style="background:rgba(55,224,176,.06);border:1px solid rgba(55,224,176,.3);border-left:3px solid var(--ok);border-radius:4px;padding:16px 18px;"><div style="font-family:var(--mono);font-size:11px;color:var(--ok);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;">Positive</div><div style="font-size:15px;color:var(--ink2);">${c.positive}</div></div>`:''}
      </div>
    </div>
  </div>
  <div class="slide-num">02 / 05</div>
</section>

<!-- 03 Budget -->
<section data-screen-label="03 Budget">
  <div class="grid-bg"></div>
  <div class="glow" style="top:-150px;right:-150px;width:500px;height:500px;opacity:.5;"></div>
  <div class="pad">
    <div class="eyebrow">Financial Update</div>
    <div class="slide-title">Cost vs. Budget</div>
    <div class="sec-rule"></div>
    <table class="btbl">
      <thead><tr><th>Category</th><th class="r">Budget (£)</th><th class="r">Spent to date (£)</th><th class="r">Forecast outturn (£)</th><th>Status</th></tr></thead>
      <tbody>${budgetRows}</tbody>
    </table>
    <div style="display:flex;gap:14px;margin-top:20px;">
      <div style="flex:1;background:var(--sur2);border:1px solid var(--border);padding:16px 20px;border-radius:4px;display:flex;justify-content:space-between;align-items:baseline;"><span style="font-family:var(--mono);font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">Forecast profit</span><span style="font-family:var(--mono);font-size:24px;font-weight:500;color:var(--ok);">${fm(c.forecastProfit)}</span></div>
      <div style="flex:1;background:var(--sur2);border:1px solid var(--border);padding:16px 20px;border-radius:4px;display:flex;justify-content:space-between;align-items:baseline;"><span style="font-family:var(--mono);font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">Forecast margin</span><span style="font-family:var(--mono);font-size:24px;font-weight:500;color:var(--ok);">${fp(c.forecastMargin)}</span></div>
      <div style="flex:1;background:var(--sur2);border:1px solid var(--border);padding:16px 20px;border-radius:4px;display:flex;justify-content:space-between;align-items:baseline;"><span style="font-family:var(--mono);font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;">vs. original</span><span style="font-family:var(--mono);font-size:24px;font-weight:500;color:var(--ok);">${or(c.vsOriginal,'—')}</span></div>
    </div>
  </div>
  <div class="slide-num">03 / 05</div>
</section>

<!-- 04 Sales -->
<section data-screen-label="04 Sales">
  <div class="grid-bg"></div>
  <div class="glow" style="bottom:-150px;right:-150px;width:500px;height:500px;opacity:.5;"></div>
  <div class="pad">
    <div class="eyebrow">Sales Update</div>
    <div class="slide-title">Reservations &amp; Completions</div>
    <div class="sec-rule"></div>
    <div class="two-col">
      <div>
        <div style="font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;">Unit status — ${or(c.totalUnits,'—')} total</div>
        ${unitBar(c.unitsSold, c.unitsReserved, c.totalUnits)}
        <div style="margin-top:24px;background:var(--sur2);border:1px solid var(--border);padding:18px 20px;border-radius:4px;">
          <div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;">Sales vs target</div>
          ${[['Exchanged',c.unitsSold,'var(--ok)'],['Reserved',c.unitsReserved,'var(--cyan)']].map(([l,v,col])=>`<div style="display:grid;grid-template-columns:180px 1fr 60px;gap:12px;align-items:center;margin-bottom:8px;"><span style="font-size:13px;color:var(--ink2)">${l}</span><div style="height:10px;background:var(--border);border-radius:2px;overflow:hidden;"><div style="height:100%;background:${col};width:${parseInt(v)&&parseInt(c.totalUnits)?parseInt(v)/parseInt(c.totalUnits)*100:0}%;"></div></div><span style="font-family:var(--mono);font-size:13px;color:${col};text-align:right;">${v||0} / ${or(c.totalUnits,'—')}</span></div>`).join('')}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="background:var(--sur2);border:1px solid var(--border);border-radius:4px;padding:20px 22px;">
          <div style="font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:14px;">Sales metrics</div>
          <div style="display:flex;flex-direction:column;gap:11px;">
            <div style="display:flex;justify-content:space-between;"><span style="color:var(--ink2)">Avg sale price</span><span style="font-family:var(--mono);color:var(--ink)">${or(c.avgSalePrice,'—')}</span></div>
            <div style="display:flex;justify-content:space-between;"><span style="color:var(--ink2)">Avg £ psf (achieved)</span><span style="font-family:var(--mono);color:var(--ok)">${c.avgPsf?'£'+parseFloat(c.avgPsf).toFixed(0)+' psf':'—'}</span></div>
            <div style="display:flex;justify-content:space-between;"><span style="color:var(--ink2)">Avg £ psf (budget)</span><span style="font-family:var(--mono);color:var(--muted)">${c.budgetPsf?'£'+parseFloat(c.budgetPsf).toFixed(0)+' psf':'—'}</span></div>
            <div style="border-top:1px solid var(--border2);padding-top:10px;display:flex;justify-content:space-between;"><span style="color:var(--ink2)">Absorption rate</span><span style="font-family:var(--mono);color:var(--cyan)">${c.absorptionRate?parseFloat(c.absorptionRate).toFixed(1)+' units/mth':'—'}</span></div>
          </div>
        </div>
        ${c.salesNote?`<div style="background:rgba(55,224,176,.06);border:1px solid rgba(55,224,176,.3);border-left:3px solid var(--ok);border-radius:4px;padding:16px 18px;"><div style="font-family:var(--mono);font-size:11px;color:var(--ok);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;">Sales note</div><div style="font-size:15px;color:var(--ink2);">${c.salesNote}</div></div>`:''}
        ${c.salesWatch?`<div style="background:rgba(255,186,69,.06);border:1px solid rgba(255,186,69,.3);border-left:3px solid var(--amber);border-radius:4px;padding:16px 18px;"><div style="font-family:var(--mono);font-size:11px;color:var(--amber);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;">Note</div><div style="font-size:15px;color:var(--ink2);">${c.salesWatch}</div></div>`:''}
      </div>
    </div>
  </div>
  <div class="slide-num">04 / 05</div>
</section>

<!-- 05 Actions -->
<section data-screen-label="05 Actions">
  <div class="grid-bg"></div>
  <div class="glow" style="top:-150px;left:-150px;width:500px;height:500px;opacity:.5;"></div>
  <div class="pad">
    <div class="eyebrow">Open Items</div>
    <div class="slide-title">Key Actions</div>
    <div class="sec-rule"></div>
    <div class="two-col">
      <div style="display:flex;flex-direction:column;gap:10px;">${actions||'<div style="color:var(--muted);font-family:var(--mono);font-size:14px;">No actions — add via the config panel</div>'}</div>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="background:var(--sur2);border:1px solid var(--border);border-radius:6px;padding:24px 26px;">
          <div style="font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:16px;">Next update</div>
          <div style="font-family:var(--serif);font-size:28px;color:var(--ink);margin-bottom:6px;">${or(c.nextUpdate,'—')}</div>
        </div>
        <div style="background:var(--sur2);border:1px solid var(--border);border-radius:6px;padding:24px 26px;">
          <div style="font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:14px;">Scheme health</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div><div style="font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;">Programme</div><div style="font-family:var(--mono);font-size:18px;color:${sevColor(c.progStatus)}">${or(c.progStatus,'—')}</div></div>
            <div><div style="font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;">Budget</div><div style="font-family:var(--mono);font-size:18px;color:${sevColor(c.budgetStatus)}">${or(c.budgetStatus,'—')}</div></div>
            <div><div style="font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;">Sales</div><div style="font-family:var(--mono);font-size:18px;color:${sevColor(c.salesStatus)}">${or(c.salesStatus,'—')}</div></div>
            <div><div style="font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;">Risk level</div><div style="font-family:var(--mono);font-size:18px;color:var(--ok);">${or(c.riskLevel,'—')}</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="slide-num">05 / 05</div>
</section>`;
}

function render() { document.getElementById('deck').innerHTML = buildSlides(C); }
render();
</script>
<script src="deck-stage.js"></script>
<script>
const FIELDS = [
  {sec:'Scheme'},{id:'name',label:'Scheme name'},{id:'address',label:'Address'},{id:'units',label:'Units'},{id:'updateMonth',label:'Current month'},{id:'totalMonths',label:'Total programme months'},{id:'date',label:'Update date'},
  {sec:'Status'},
  {id:'progStatus',label:'Programme status (On Track / Delayed / At Risk)'},{id:'budgetStatus',label:'Budget status'},{id:'salesStatus',label:'Sales status'},{id:'riskLevel',label:'Risk level'},
  {sec:'Programme'},
  {id:'startDate',label:'Start date'},{id:'targetEnd',label:'Target end date'},
  {id:'ms1title',label:'Milestone 1 title'},{id:'ms1date',label:'Milestone 1 date'},{id:'ms1status',label:'Milestone 1 status (done/active/future)'},
  {id:'ms2title',label:'Milestone 2 title'},{id:'ms2date',label:'Milestone 2 date'},{id:'ms2status',label:'Milestone 2 status'},
  {id:'ms3title',label:'Milestone 3 title'},{id:'ms3date',label:'Milestone 3 date'},{id:'ms3status',label:'Milestone 3 status'},
  {id:'ms4title',label:'Milestone 4 title'},{id:'ms4date',label:'Milestone 4 date'},{id:'ms4status',label:'Milestone 4 status'},
  {id:'ms5title',label:'Milestone 5 title'},{id:'ms5date',label:'Milestone 5 date'},{id:'ms5status',label:'Milestone 5 status'},
  {id:'ms6title',label:'Milestone 6 title'},{id:'ms6date',label:'Milestone 6 date'},{id:'ms6status',label:'Milestone 6 status'},
  {id:'watchPoint',label:'Watch point',textarea:true},{id:'positive',label:'Positive note',textarea:true},
  {sec:'Budget (£)'},
  {id:'spendToDate',label:'Spend to date (£m)'},{id:'totalBudget',label:'Total budget (£m)'},{id:'forecastProfit',label:'Forecast profit (£m)'},{id:'forecastMargin',label:'Forecast margin (%)'},{id:'vsOriginal',label:'vs. original (e.g. +£22,000)'},
  {id:'bc1label',label:'Budget row 1 label'},{id:'bc1budget',label:'B1 budget (£)'},{id:'bc1spent',label:'B1 spent (£)'},{id:'bc1forecast',label:'B1 forecast (£)'},{id:'bc1note',label:'B1 status'},
  {id:'bc2label',label:'Budget row 2 label'},{id:'bc2budget',label:'B2 budget'},{id:'bc2spent',label:'B2 spent'},{id:'bc2forecast',label:'B2 forecast'},{id:'bc2note',label:'B2 status'},
  {id:'bc3label',label:'Budget row 3 label'},{id:'bc3budget',label:'B3 budget'},{id:'bc3spent',label:'B3 spent'},{id:'bc3forecast',label:'B3 forecast'},{id:'bc3note',label:'B3 status'},
  {id:'bc4label',label:'Budget row 4 label'},{id:'bc4budget',label:'B4 budget'},{id:'bc4spent',label:'B4 spent'},{id:'bc4forecast',label:'B4 forecast'},{id:'bc4note',label:'B4 status'},
  {id:'bc5label',label:'Budget row 5 label'},{id:'bc5budget',label:'B5 budget'},{id:'bc5spent',label:'B5 spent'},{id:'bc5forecast',label:'B5 forecast'},{id:'bc5note',label:'B5 status'},
  {id:'bc6label',label:'Budget row 6 label'},{id:'bc6budget',label:'B6 budget'},{id:'bc6spent',label:'B6 spent'},{id:'bc6forecast',label:'B6 forecast'},{id:'bc6note',label:'B6 status'},
  {sec:'Sales'},
  {id:'unitsSold',label:'Units exchanged'},{id:'unitsReserved',label:'Units reserved'},{id:'totalUnits',label:'Total units'},
  {id:'avgSalePrice',label:'Avg sale price (e.g. £495,000)'},{id:'avgPsf',label:'Avg £ psf achieved'},{id:'budgetPsf',label:'Budget £ psf'},{id:'absorptionRate',label:'Absorption (units/mth)'},
  {id:'salesNote',label:'Sales note',textarea:true},{id:'salesWatch',label:'Sales watch point',textarea:true},
  {sec:'Actions'},
  {id:'a1title',label:'Action 1 title'},{id:'a1desc',label:'Action 1 description',textarea:true},{id:'a1pri',label:'A1 priority (high/med/low)'},{id:'a1due',label:'A1 due date'},
  {id:'a2title',label:'Action 2 title'},{id:'a2desc',label:'Action 2 description',textarea:true},{id:'a2pri',label:'A2 priority'},{id:'a2due',label:'A2 due date'},
  {id:'a3title',label:'Action 3 title'},{id:'a3desc',label:'Action 3 description',textarea:true},{id:'a3pri',label:'A3 priority'},{id:'a3due',label:'A3 due date'},
  {id:'a4title',label:'Action 4 title'},{id:'a4desc',label:'Action 4 description',textarea:true},{id:'a4pri',label:'A4 priority'},{id:'a4due',label:'A4 due date'},
  {id:'nextUpdate',label:'Next update date'},
];

function buildPanel(){return FIELDS.map(f=>{if(f.sec)return`<div class="cfg-sec">${f.sec}</div>`;if(f.textarea)return`<div class="cfg-f"><label>${f.label}</label><textarea id="cf_${f.id}">${C[f.id]||''}</textarea></div>`;return`<div class="cfg-f"><label>${f.label}</label><input id="cf_${f.id}" value="${(C[f.id]||'').toString().replace(/"/g,'&quot;')}"></div>`;}).join('');}
function toggleCfg(){const p=document.getElementById('cfg');const op=!p.classList.contains('open');if(op)document.getElementById('cfg-body').innerHTML=buildPanel();p.classList.toggle('open');}
function saveCfg(){FIELDS.filter(f=>f.id).forEach(f=>{const el=document.getElementById('cf_'+f.id);if(el)C[f.id]=el.value;});localStorage.setItem(STORE,JSON.stringify(C));const old=document.getElementById('deck');const neo=document.createElement('deck-stage');neo.setAttribute('id','deck');neo.setAttribute('width','1920');neo.setAttribute('height','1080');neo.innerHTML=buildSlides(C);old.replaceWith(neo);toggleCfg();}
</script>
</body>
