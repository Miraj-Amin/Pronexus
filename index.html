<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Phoenix — Development Appraisal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="crm.css" />
</head>
<body>
<div id="root"></div>
<div id="boot-error" style="display:none;position:fixed;inset:0;z-index:99999;background:#12202f;color:#f6f3ec;font-family:'IBM Plex Mono',monospace;font-size:13px;line-height:1.6;padding:32px;overflow:auto">
  <h1 style="font-size:15px;color:#ffb27a;margin:0 0 12px">⚠ Startup error</h1>
  <div style="color:#9fb0bf">The app hit an error while loading (also in the Console, F12):</div>
  <pre id="boot-error-msg" style="white-space:pre-wrap;color:#e88;background:#0d1926;padding:14px;border-radius:8px;border:1px solid #24384a;margin-top:12px"></pre>
</div>
<script>
(function(){
  function show(m){var b=document.getElementById('boot-error'),p=document.getElementById('boot-error-msg');
    if(b&&p){p.textContent+=(p.textContent?'\n\n':'')+m;b.style.display='block';}}
  window.addEventListener('error',function(e){
    var m=e&&e.message?e.message:String(e);
    // Prefer the real stack (points at the .jsx source file) over Babel's index.html attribution
    if(e&&e.error&&e.error.stack) m+='\n\n'+e.error.stack;
    else if(e&&e.filename) m+='\n  at '+e.filename+':'+(e.lineno||'?');
    show(m);
  });
  window.addEventListener('unhandledrejection',function(e){
    var r=e&&e.reason;
    var m='Unhandled rejection: '+(r&&r.message?r.message:r);
    if(r&&r.stack) m+='\n\n'+r.stack;
    show(m);
  });
  window.addEventListener('load',function(){setTimeout(function(){
    var r=document.getElementById('root');
    if(r&&r.childElementCount===0){
      if(!window.React)show('React did not load — check the CDN <script> tags / your network.');
      else if(!window.ReactDOM)show('ReactDOM did not load.');
      else if(!window.Babel)show('Babel did not load — the .jsx files cannot be compiled.');
      else {
        // Component-presence check: each .jsx file exports its component onto
        // window. If one is missing, a file failed to load/compile (usually a
        // stale cached copy) — name it so the fix is obvious.
        var need={ImportModal:'import-ui.jsx',Portfolio:'portfolio.jsx',SummaryScreen:'summary.jsx',CashflowTable:'cashflow.jsx',InputScreen:'input.jsx',Presentation:'presentation.jsx',CRMApp:'crm.jsx',Appraisal:'engine.js',AppraisalImport:'import.js',DB:'db.js'};
        var missing=[];for(var k in need){if(!window[k])missing.push(k+' ('+need[k]+')');}
        if(missing.length)show('Some scripts did not load or are a stale cached copy. Missing: '+missing.join(', ')+'.\n\nFix: hard-refresh (Ctrl/Cmd+Shift+R). If it persists, re-upload those files and confirm the ?v= number in index.html matches your latest upload.');
        else show('Scripts loaded but nothing rendered. Check the Console for the first red error (expand it to see the file & line).');
      }}
  },6000);});
})();
</script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="engine.js?v=8"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="import.js?v=8"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="supabaseClient.js?v=8"></script>
<script src="db.js?v=8"></script>
<script type="text/babel" src="dashboard.jsx?v=8"></script>
<script type="text/babel" src="summary.jsx?v=8"></script>
<script type="text/babel" src="cashflow.jsx?v=8"></script>
<script type="text/babel" src="portfolio.jsx?v=8"></script>
<script type="text/babel" src="import-ui.jsx?v=8"></script>
<script type="text/babel" src="input.jsx?v=8"></script>
<script type="text/babel" src="auth.jsx?v=8"></script>
<script type="text/babel" src="collab.jsx?v=8"></script>
<script type="text/babel" src="versions.jsx?v=8"></script>
<script type="text/babel" src="printpack.jsx?v=8"></script>
<script type="text/babel" src="presentation.jsx?v=8"></script>
<script type="text/babel" src="crm.jsx?v=8"></script>
<script type="text/babel" src="crm-detail.jsx?v=8"></script>
<script type="text/babel" src="app.jsx?v=8"></script>
</body>
</html>
