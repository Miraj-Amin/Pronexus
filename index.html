  <h1 style="font-size:15px;color:#ffb27a;margin:0 0 12px">⚠ Startup error</h1>
  <div style="color:#9fb0bf">The app hit an error while loading (also in the Console, F12):</div>
  <pre id="boot-error-msg" style="white-space:pre-wrap;color:#e88;background:#0d1926;padding:14px;border-radius:8px;border:1px solid #24384a;margin-top:12px"></pre>
</div>
<script>
// Loads a script from the first URL that succeeds, trying each in order. Uses
// a blocking (synchronous) XHR so execution order relative to the surrounding
// <script> tags is preserved exactly like a normal <script src> would be —
// this matters because supabaseClient.js runs immediately after and expects
// window.supabase to already exist. Falls back across independent CDNs
// (different infrastructure/networks) so a block or outage on one doesn't
// take out the feature — this is what was failing before ("Excel reader
// failed to load"): jsdelivr.net alone is a single point of failure.
function loadScriptWithFallback(urls, label) {
  for (var i = 0; i < urls.length; i++) {
    try {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', urls[i], false); // false = synchronous
      xhr.send(null);
      if (xhr.status >= 200 && xhr.status < 300 && xhr.responseText) {
        var s = document.createElement('script');
        s.text = xhr.responseText;
        document.head.appendChild(s);
        return true;
      }
    } catch (e) { /* try next source */ }
  }
  console.error('[boot] All CDN sources failed for ' + label + ':', urls);
  return false;
}
</script>
<script>
(function(){
  var BUILD='v=19';
  try{ console.log('%cPronexus build '+BUILD+' loaded '+new Date().toISOString(), 'color:#2dd4ff;font-weight:bold'); }catch(e){}
  window.__PRONEXUS_BUILD=BUILD;
  // Visible on-page badge — no DevTools needed to confirm which build is live.
  window.addEventListener('DOMContentLoaded', function(){
    var b=document.createElement('div');
    b.textContent='build '+BUILD;
    b.style.cssText='position:fixed;bottom:6px;right:8px;z-index:99998;font:11px/1.4 monospace;color:#5b6b78;background:rgba(18,32,47,.85);padding:3px 8px;border-radius:5px;pointer-events:none;';
    document.body.appendChild(b);
  });
  function show(m){var b=document.getElementById('boot-error'),p=document.getElementById('boot-error-msg');
    if(b&&p){p.textContent+=(p.textContent?'\n\n':'')+m;b.style.display='block';}}
  window.addEventListener('error',function(e){
    var m=e&&e.message?e.message:String(e);
    // Prefer the real stack (points at the .jsx source file) over Babel's index.html attribution
    if(e&&e.error&&e.error.stack) m+='\n\n'+e.error.stack;
    else if(e&&e.filename) m+='\n  at '+e.filename+':'+(e.lineno||'?');
    show(m);
  });
  window.addEventListener('unhandledrejection',function(e){
    var r=e&&e.reason;
    var m='Unhandled rejection: '+(r&&r.message?r.message:r);
    if(r&&r.stack) m+='\n\n'+r.stack;
    show(m);
  });
  window.addEventListener('load',function(){setTimeout(function(){
    var r=document.getElementById('root');
    if(r&&r.childElementCount===0){
      if(!window.React)show('React did not load — check the CDN <script> tags / your network.');
      else if(!window.ReactDOM)show('ReactDOM did not load.');
      else if(!window.Babel)show('Babel did not load — the .jsx files cannot be compiled.');
      else {
        // Component-presence check: each .jsx file exports its component onto
        // window. If one is missing, a file failed to load/compile (usually a
        // stale cached copy) — name it so the fix is obvious.
        var need={ImportModal:'portfolio.jsx',Portfolio:'portfolio.jsx',SummaryScreen:'summary.jsx',CashflowTable:'cashflow.jsx',InputScreen:'input.jsx',Presentation:'presentation.jsx',CRMApp:'crm.jsx',FeedbackLayer:'feedback.jsx',Appraisal:'engine.js',AppraisalImport:'portfolio.jsx',DB:'db.js'};
        var missing=[];for(var k in need){if(!window[k])missing.push(k+' ('+need[k]+')');}
        if(missing.length)show('Some scripts did not load or are a stale cached copy. Missing: '+missing.join(', ')+'.\n\nFix: hard-refresh (Ctrl/Cmd+Shift+R). If it persists, re-upload those files and confirm the ?v= number in index.html matches your latest upload.');
        else show('Scripts loaded but nothing rendered. Check the Console for the first red error (expand it to see the file & line).');
      }}
  },6000);});
})();
</script>
