<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Phoenix — Due Diligence Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ece5d4;--paper:#f7f3e9;--paper-border:#d2c6ac;--page-ink:#26313f;--page-ink-2:#6a6256;
  --surface:#0a1626;--surface-2:#0d1d31;--surface-3:#102842;--border:#173251;--border-strong:#21466d;
  --ink:#eef6fd;--ink-2:#c4ddf1;--muted:#93b4ce;--cyan:#2dd4ff;--cyan-2:#1fc0e8;
  --amber:#ffba45;--red:#ff5a5a;--ok:#37e0b0;
  --sans:'IBM Plex Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',ui-monospace,monospace;
}
*,*::before,*::after{box-sizing:border-box;}
body{margin:0;background:var(--bg);font-family:var(--sans);font-size:14px;color:var(--page-ink);-webkit-font-smoothing:antialiased;}
.topbar{position:sticky;top:0;z-index:50;height:52px;background:rgba(247,243,233,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--paper-border);display:flex;align-items:center;gap:16px;padding:0 20px;}
.brand{display:flex;align-items:center;gap:10px;}
.mark{width:26px;height:26px;border-radius:5px;background:linear-gradient(135deg,#1366d6,#2dd4ff);display:grid;place-items:center;color:#fff;font-weight:700;font-size:11px;font-family:var(--mono);}
.bname{font-family:var(--mono);font-weight:600;font-size:14px;letter-spacing:1.5px;text-transform:uppercase;}
.bsep{color:var(--paper-border);margin:0 2px;}.bdoc{font-family:var(--mono);font-size:11px;color:var(--page-ink-2);}
.spacer{flex:1;}
.tbtn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--paper-border);background:var(--paper);color:var(--page-ink-2);font-family:var(--mono);font-size:11px;padding:6px 12px;border-radius:3px;cursor:pointer;transition:all .12s;text-decoration:none;}
.tbtn:hover{border-color:#1366d6;color:#1366d6;}
.main{padding:20px;max-width:980px;margin:0 auto;}
.header-row{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:24px;}
.scheme-block{}
.scheme-label{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--page-ink-2);margin-bottom:6px;}
.scheme-input{padding:7px 12px;border:1px solid var(--paper-border);border-radius:4px;background:var(--paper);font-family:var(--mono);font-size:14px;font-weight:600;color:var(--page-ink);width:280px;}
.scheme-input:focus{outline:none;border-color:#1366d6;}
.progress-bar-wrap{flex:1;max-width:360px;}
.prog-meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--page-ink-2);margin-bottom:7px;}
.prog-bar{height:8px;background:var(--paper-border);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--ok),var(--cyan));border-radius:4px;transition:width .3s;}
.sectitle{display:flex;align-items:center;gap:11px;margin:0 0 14px;}
.sectitle h2{margin:0;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#3a4452;font-family:var(--mono);}
.sectitle h2::before{content:'┌─ ';color:#b8a884;}
.sectitle .rule{flex:1;height:1px;background:repeating-linear-gradient(90deg,#cdbfa3 0 6px,transparent 6px 12px);}
.cats-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:7px;overflow:hidden;}
.cat-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;transition:background .12s;}
.cat-head:hover{background:var(--surface-2);}
.cat-icon{width:28px;height:28px;border-radius:5px;display:grid;place-items:center;font-size:14px;flex:none;}
.cat-head h3{margin:0;font-family:var(--mono);font-size:11.5px;font-weight:600;color:var(--ink);flex:1;}
.cat-prog{font-family:var(--mono);font-size:10px;color:var(--muted);}
.cat-prog-bar{width:60px;height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;margin-left:8px;}
.cat-prog-fill{height:100%;border-radius:3px;transition:width .3s;}
.cat-body{padding:0;}
.item{display:grid;grid-template-columns:32px 1fr auto;align-items:start;gap:0;padding:11px 16px;border-bottom:1px solid var(--border);}
.item:last-child{border-bottom:none;}
.item .chk{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border-strong);display:grid;place-items:center;cursor:pointer;background:var(--surface-2);flex:none;margin-top:1px;transition:all .12s;}
.item .chk:hover{border-color:var(--cyan);}
.item .chk.done{background:var(--ok);border-color:var(--ok);}
.item .chk.done svg{stroke:#04141c;}
.item .chk.inprog{background:rgba(255,186,69,.15);border-color:var(--amber);}
.item-content{padding-left:10px;}
.item-title{font-size:13px;color:var(--ink-2);line-height:1.4;}
.item-title.done{text-decoration:line-through;color:var(--muted);}
.item-note{margin-top:4px;font-size:11px;color:var(--muted);font-family:var(--mono);}
.status-sel{border:1px solid var(--border);background:var(--surface-2);color:var(--muted);font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;cursor:pointer;appearance:none;-webkit-appearance:none;text-align:center;transition:all .12s;min-width:72px;}
.status-sel:focus{outline:none;border-color:var(--cyan);}
.status-sel.s-done{color:var(--ok);border-color:rgba(55,224,176,.4);background:rgba(55,224,176,.08);}
.status-sel.s-prog{color:var(--amber);border-color:rgba(255,186,69,.4);background:rgba(255,186,69,.08);}
.collapsed .cat-body{display:none;}
@media print{
  .topbar,.tbtn{display:none!important;}
  body{background:#fff;color:#222;}
  .cat-card{border:1px solid #ccc;break-inside:avoid;margin-bottom:12px;}
  .item{border-bottom:1px solid #eee;}
  .cats-grid{grid-template-columns:1fr;}
  .cat-head{background:#f5f5f5!important;}
  .item-title,.cat-head h3,.cat-icon{color:#222!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <div class="mark">P</div>
    <span class="bname">PHOENIX</span><span class="bsep">|</span>
    <span class="bdoc">Due Diligence Checklist</span>
  </div>
  <div class="spacer"></div>
  <button class="tbtn" onclick="window.print()">Print</button>
  <a class="tbtn" href="../Phoenix Hub.html">← Hub</a>
</div>

<div class="main">
  <div class="header-row">
    <div class="scheme-block">
      <div class="scheme-label">Scheme</div>
      <input class="scheme-input" id="scheme-name" placeholder="Walnut Marches, East Grinstead" oninput="save()">
    </div>
    <div class="progress-bar-wrap">
      <div class="prog-meta"><span>Overall Progress</span><span id="prog-text">0 / 0 complete</span></div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="sectitle"><h2>Checklist</h2><div class="rule"></div></div>
  <div class="cats-grid" id="cats"></div>
</div>

<script>
const CATS=[
  {id:'title',icon:'📋',label:'Title & Legal',items:[
    'Land Registry title verified','Boundary survey obtained','Restrictive covenants reviewed','Rights of way & easements checked','Overage / clawback clauses reviewed','Option / conditional contract terms agreed','Solicitors instructed & conflicts checked','Seller identity verified (AML)',
  ]},
  {id:'planning',icon:'🏗️',label:'Planning & Consents',items:[
    'Planning status confirmed (PP / outline / none)','Pre-application discussions completed','S106 & CIL obligations fully quantified','Listed building / conservation area checks','Highways & transport assessment','Flood-risk planning restrictions reviewed','FPC submitted to council','Planning conditions list reviewed',
  ]},
  {id:'construction',icon:'🔧',label:'Construction & Technical',items:[
    'Structural survey complete','Phase 1 environmental / contamination report','Phase 2 ground investigation (if needed)','Utilities capacity (gas / electric / water)','Drainage strategy confirmed','Asbestos survey (if existing buildings)','Contractor desktop quotes received','NHBC / warranty provider confirmed',
  ]},
  {id:'finance',icon:'🏦',label:'Finance & Funding',items:[
    'Equity commitment confirmed in writing','Facility term sheet issued & reviewed','Loan-to-GDV within agreed threshold','Interest rate locked or cap agreed','Drawdown schedule aligned to cashflow','Monitoring surveyor appointed','Appraisal / Red Book valuation instructed','Lender solicitors instructed',
  ]},
  {id:'commercial',icon:'💷',label:'Commercial & Sales',items:[
    'Sales comparables researched & documented','Sales agent appointed & terms agreed','Pricing strategy & GDV confirmed','Marketing / show-home budget agreed','Sales forecast modelled in appraisal','Reservation forms agreed (legal review)','Warranty provider confirmed for purchasers',
  ]},
  {id:'env',icon:'🌿',label:'Environmental & Sustainability',items:[
    'EPC target ratings confirmed','Biodiversity Net Gain assessment','BREEAM / sustainable homes standard','Ecology & bat survey (if relevant)','Surface water & SuDS strategy','Party wall notices (if required)','Tree survey & arboricultural report',
  ]},
];

let state=JSON.parse(localStorage.getItem('phx_dd')||'{}');
function save(){
  state.scheme=document.getElementById('scheme-name').value;
  localStorage.setItem('phx_dd',JSON.stringify(state));
  updateProgress();
}
function getItem(catId,idx){return ((state[catId]||{})[idx])||{status:'todo',note:''};}
function setStatus(catId,idx,val){
  if(!state[catId])state[catId]={};
  if(!state[catId][idx])state[catId][idx]={status:'todo',note:''};
  state[catId][idx].status=val;save();
  // update chk class
  const chk=document.querySelector(`[data-chk="${catId}-${idx}"]`);
  if(chk){chk.className='chk'+(val==='done'?' done':val==='inprog'?' inprog':'');}
  const sel=document.querySelector(`[data-sel="${catId}-${idx}"]`);
  if(sel){sel.className='status-sel s-'+val.replace('todo','n');}
  const title=document.querySelector(`[data-ititle="${catId}-${idx}"]`);
  if(title)title.className='item-title'+(val==='done'?' done':'');
  updateCatProg(catId);updateProgress();
}
function cycleStatus(catId,idx){
  const cur=getItem(catId,idx).status;
  const next=cur==='todo'?'inprog':cur==='inprog'?'done':'todo';
  setStatus(catId,idx,next);
}
function updateCatProg(catId){
  const cat=CATS.find(c=>c.id===catId);if(!cat)return;
  const done=cat.items.filter((_,i)=>getItem(catId,i).status==='done').length;
  const pct=cat.items.length?done/cat.items.length*100:0;
  const fill=document.querySelector(`[data-cpfill="${catId}"]`);
  const txt=document.querySelector(`[data-cptxt="${catId}"]`);
  if(fill)fill.style.width=pct+'%';
  if(txt)txt.textContent=done+'/'+cat.items.length;
  const col=pct===100?'var(--ok)':pct>0?'var(--amber)':'rgba(255,255,255,.2)';
  if(fill)fill.style.background=col;
}
function updateProgress(){
  const total=CATS.reduce((s,c)=>s+c.items.length,0);
  const done=CATS.reduce((s,c)=>s+c.items.filter((_,i)=>getItem(c.id,i).status==='done').length,0);
  document.getElementById('prog-text').textContent=done+' / '+total+' complete';
  document.getElementById('prog-fill').style.width=(total?done/total*100:0)+'%';
}

function render(){
  if(state.scheme)document.getElementById('scheme-name').value=state.scheme;
  const container=document.getElementById('cats');
  container.innerHTML='';
  CATS.forEach(cat=>{
    const done=cat.items.filter((_,i)=>getItem(cat.id,i).status==='done').length;
    const pct=cat.items.length?done/cat.items.length*100:0;
    const col=pct===100?'var(--ok)':pct>0?'var(--amber)':'rgba(255,255,255,.2)';
    const card=document.createElement('div');
    card.className='cat-card';
    card.innerHTML=`
      <div class="cat-head" onclick="this.closest('.cat-card').classList.toggle('collapsed')">
        <div class="cat-icon" style="background:rgba(45,212,255,.08)">${cat.icon}</div>
        <h3>${cat.label}</h3>
        <span class="cat-prog" data-cptxt="${cat.id}">${done}/${cat.items.length}</span>
        <div class="cat-prog-bar"><div class="cat-prog-fill" data-cpfill="${cat.id}" style="width:${pct}%;background:${col}"></div></div>
      </div>
      <div class="cat-body">
        ${cat.items.map((item,i)=>{
          const s=getItem(cat.id,i).status;
          return `<div class="item">
            <div class="chk ${s==='done'?'done':s==='inprog'?'inprog':''}" data-chk="${cat.id}-${i}" onclick="cycleStatus('${cat.id}',${i})">
              ${s==='done'?`<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 5.5l2.5 2.5 4.5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
              ${s==='inprog'?`<div style="width:6px;height:6px;border-radius:50%;background:var(--amber)"></div>`:''}
            </div>
            <div class="item-content">
              <div class="item-title ${s==='done'?'done':''}" data-ititle="${cat.id}-${i}">${item}</div>
            </div>
            <select class="status-sel s-${s==='todo'?'n':s}" data-sel="${cat.id}-${i}" onchange="setStatus('${cat.id}',${i},this.value)">
              <option value="todo" ${s==='todo'?'selected':''}>To Do</option>
              <option value="inprog" ${s==='inprog'?'selected':''}>In Progress</option>
              <option value="done" ${s==='done'?'selected':''}>Done</option>
            </select>
          </div>`;
        }).join('')}
      </div>`;
    container.appendChild(card);
  });
  updateProgress();
}
render();
</script>
</body>
</html>
