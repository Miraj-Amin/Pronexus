<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Phoenix — Pipeline Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ece5d4;--paper:#f7f3e9;--paper-border:#d2c6ac;--page-ink:#26313f;--page-ink-2:#6a6256;
  --surface:#0a1626;--surface-2:#0d1d31;--surface-3:#102842;--border:#173251;--border-strong:#21466d;
  --ink:#eef6fd;--ink-2:#c4ddf1;--muted:#93b4ce;--cyan:#2dd4ff;--cyan-2:#1fc0e8;
  --amber:#ffba45;--red:#ff5a5a;--ok:#37e0b0;
  --sans:'IBM Plex Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',ui-monospace,monospace;
}
*,*::before,*::after{box-sizing:border-box;}
body{margin:0;background:var(--bg);font-family:var(--sans);font-size:14px;color:var(--page-ink);-webkit-font-smoothing:antialiased;}
.topbar{position:sticky;top:0;z-index:50;height:52px;background:rgba(247,243,233,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--paper-border);display:flex;align-items:center;gap:16px;padding:0 20px;}
.brand{display:flex;align-items:center;gap:10px;}
.mark{width:26px;height:26px;border-radius:5px;background:linear-gradient(135deg,#1366d6,#2dd4ff);display:grid;place-items:center;color:#fff;font-weight:700;font-size:11px;font-family:var(--mono);}
.bname{font-family:var(--mono);font-weight:600;font-size:14px;letter-spacing:1.5px;text-transform:uppercase;}
.bsep{color:var(--paper-border);margin:0 2px;}
.bdoc{font-family:var(--mono);font-size:11px;color:var(--page-ink-2);}
.spacer{flex:1;}
.tbtn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--paper-border);background:var(--paper);color:var(--page-ink-2);font-family:var(--mono);font-size:11px;padding:6px 12px;border-radius:3px;cursor:pointer;transition:all .12s;text-decoration:none;}
.tbtn:hover{border-color:#1366d6;color:#1366d6;}
.main{padding:20px;max-width:1700px;margin:0 auto;}
.sectitle{display:flex;align-items:center;gap:11px;margin:0 0 14px;}
.sectitle h2{margin:0;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#3a4452;font-family:var(--mono);}
.sectitle h2::before{content:'┌─ ';color:#b8a884;}
.sectitle .rule{flex:1;height:1px;background:repeating-linear-gradient(90deg,#cdbfa3 0 6px,transparent 6px 12px);}
.rollup{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px;}
.ru{background:linear-gradient(180deg,var(--surface-2),var(--surface));border:1px solid var(--border);padding:14px 16px;position:relative;}
.ru::before,.ru::after{content:'';position:absolute;width:6px;height:6px;border-color:var(--cyan);opacity:.5;}
.ru::before{top:-1px;left:-1px;border-top:1px solid;border-left:1px solid;}
.ru::after{bottom:-1px;right:-1px;border-bottom:1px solid;border-right:1px solid;}
.ru .l{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);}
.ru .v{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--ink);margin-top:6px;letter-spacing:-.4px;}
.ru .v.ok{color:var(--ok);}.ru .v.amber{color:var(--amber);}.ru .v.red{color:var(--red);}
.ru .s{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:4px;}
.filterbar{display:flex;gap:8px;margin-bottom:16px;align-items:center;}
.flabel{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--page-ink-2);}
.fbtn{border:1px solid var(--paper-border);background:var(--paper);color:var(--page-ink-2);font-family:var(--mono);font-size:11px;padding:5px 11px;border-radius:2px;cursor:pointer;transition:all .12s;}
.fbtn:hover{border-color:#1366d6;color:#1366d6;}
.fbtn.act{background:#1366d6;border-color:#1366d6;color:#fff;}
.kanban{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;align-items:start;}
.col{background:rgba(10,22,38,.35);border:1px solid var(--border);border-radius:6px;min-height:160px;}
.col-head{padding:10px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.col-stage{font-family:var(--mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
.col-count{background:var(--surface-3);border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:3px;margin-left:auto;}
.col-body{padding:8px;display:flex;flex-direction:column;gap:7px;}
.deal{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:11px 12px;cursor:pointer;transition:border-color .14s,box-shadow .14s;position:relative;overflow:hidden;}
.deal::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;}
.deal.r-ok::before{background:var(--ok);box-shadow:0 0 8px var(--ok);}
.deal.r-amber::before{background:var(--amber);box-shadow:0 0 8px var(--amber);}
.deal.r-red::before{background:var(--red);box-shadow:0 0 8px var(--red);}
.deal.r-n::before{background:var(--muted);}
.deal:hover{border-color:var(--cyan);box-shadow:0 4px 16px rgba(45,212,255,.12);}
.deal-name{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink);}
.deal-addr{font-size:10.5px;color:var(--muted);margin-top:2px;}
.deal-row{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:9px;}
.dk .dl{font-family:var(--mono);font-size:8.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);}
.dk .dv{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--ink);margin-top:1px;}
.dk .dv.ok{color:var(--ok);}.dk .dv.amber{color:var(--amber);}.dk .dv.red{color:var(--red);}
.chips{display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;}
.chip{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:2px;border:1px solid var(--border);background:var(--surface-2);color:var(--muted);}
.overlay{position:fixed;inset:0;background:rgba(3,8,16,.7);backdrop-filter:blur(3px);z-index:100;display:grid;place-items:center;}
.overlay.hid{display:none;}
.modal{background:var(--surface);border:1px solid var(--border-strong);border-radius:8px;width:530px;max-width:92vw;max-height:86vh;overflow-y:auto;}
.mhead{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
.mhead h3{margin:0;font-family:var(--mono);font-size:15px;font-weight:600;color:var(--ink);}
.mclose{width:28px;height:28px;display:grid;place-items:center;border:1px solid var(--border);background:var(--surface-2);border-radius:4px;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;transition:all .12s;}
.mclose:hover{color:var(--red);}
.mbody{padding:20px 24px;}
.mstats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:16px;}
.mstat{background:var(--surface-2);border:1px solid var(--border);border-radius:4px;padding:10px 12px;}
.mstat .ml{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
.mstat .mv{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--ink);margin-top:4px;}
.mstat .mv.ok{color:var(--ok);}.mstat .mv.amber{color:var(--amber);}.mstat .mv.red{color:var(--red);}
.mlabel{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:7px;}
.stages{display:flex;gap:0;margin-bottom:16px;}
.sstep{flex:1;padding:6px 8px;font-family:var(--mono);font-size:9px;text-align:center;border:1px solid var(--border);border-right:none;color:var(--muted);}
.sstep:last-child{border-right:1px solid var(--border);}
.sstep.act{background:rgba(45,212,255,.1);color:var(--cyan);border-color:var(--cyan);font-weight:600;}
.sstep.done{background:rgba(55,224,176,.07);color:var(--ok);}
.ntarea{width:100%;border:1px solid var(--border-strong);background:var(--surface-2);color:var(--ink);border-radius:4px;padding:9px 11px;font-family:var(--sans);font-size:13px;line-height:1.5;resize:vertical;min-height:70px;}
.ntarea:focus{outline:none;border-color:var(--cyan);}
.ntarea::placeholder{color:var(--muted);}
.mbtns{display:flex;gap:8px;margin-top:14px;}
.mbtn{flex:1;padding:8px 12px;border:1px solid var(--border);background:var(--surface-2);color:var(--ink-2);font-family:var(--mono);font-size:11px;border-radius:3px;cursor:pointer;transition:all .12s;}
.mbtn:hover{border-color:var(--cyan);color:var(--cyan);}
.mbtn:disabled{opacity:.3;cursor:default;}
.mbtn.pri{background:var(--cyan-2);border-color:var(--cyan-2);color:#04141c;font-weight:600;}
.mbtn.pri:hover{background:var(--cyan);box-shadow:0 0 12px rgba(45,212,255,.3);}
@media(max-width:1200px){.kanban{grid-template-columns:repeat(3,1fr);}.rollup{grid-template-columns:repeat(3,1fr);}}
@media(max-width:700px){.kanban{grid-template-columns:1fr 1fr;}.rollup{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">
    <div class="mark">P</div>
    <span class="bname">PHOENIX</span><span class="bsep">|</span>
    <span class="bdoc">Pipeline Tracker</span>
  </div>
  <div class="spacer"></div>
  <button class="tbtn" onclick="addDeal()">+ New Deal</button>
  <a class="tbtn" href="../Phoenix Hub.html">← Hub</a>
</div>

<div class="main">
  <div class="sectitle"><h2>Pipeline Overview</h2><div class="rule"></div></div>
  <div class="rollup" id="rollup"></div>
  <div class="filterbar">
    <span class="flabel">Show</span>
    <button class="fbtn act" onclick="setF('all',this)">All</button>
    <button class="fbtn" onclick="setF('ok',this)">Low risk</button>
    <button class="fbtn" onclick="setF('amber',this)">Elevated</button>
    <button class="fbtn" onclick="setF('red',this)">High risk</button>
  </div>
  <div class="sectitle"><h2>Deals by Stage</h2><div class="rule"></div></div>
  <div class="kanban" id="board"></div>
</div>

<div class="overlay hid" id="ov" onclick="closeM(event)">
  <div class="modal" id="modal"></div>
</div>

<script>
const STAGES=['Sourcing','Due Diligence','Under Offer','In Appraisal','Legals','Complete'];
let filter='all';
let deals=JSON.parse(localStorage.getItem('phx_pipe')||'null')||[
  {id:1,name:'Walnut Marches',addr:'East Grinstead, W. Sussex',stage:'In Appraisal',units:29,gdv:14.5,margin:22.4,peak:9.2,risk:'ok',type:'Residential',notes:'FPC submitted. Planning committee scheduled Nov.'},
  {id:2,name:'Cedar Rise',addr:'Haywards Heath, W. Sussex',stage:'Under Offer',units:14,gdv:7.8,margin:18.1,peak:5.1,risk:'amber',type:'Residential',notes:'Solicitors instructed. Title queries outstanding.'},
  {id:3,name:'Quarry Fields',addr:'Crawley, W. Sussex',stage:'Complete',units:52,gdv:24.2,margin:25.3,peak:15.6,risk:'ok',type:'Residential',notes:'All units sold. Final account agreed.'},
  {id:4,name:'Elm Court',addr:'Tunbridge Wells, Kent',stage:'Due Diligence',units:8,gdv:4.1,margin:15.2,peak:2.8,risk:'red',type:'Conversion',notes:'Listed building constraints. Heritage officer meeting booked.'},
  {id:5,name:'Brook House',addr:'Horsham, W. Sussex',stage:'Sourcing',units:22,gdv:11.2,margin:null,peak:null,risk:'n',type:'Residential',notes:'Initial site visit done. Awaiting asking price.'},
  {id:6,name:'Station Quarter',addr:'Three Bridges, W. Sussex',stage:'Legals',units:64,gdv:31.5,margin:21.8,peak:20.4,risk:'ok',type:'Mixed Use',notes:'Facility agreed with Barclays. Exchange expected Dec.'},
  {id:7,name:'Fairfield Lane',addr:'Burgess Hill, W. Sussex',stage:'Sourcing',units:12,gdv:6.4,margin:null,peak:null,risk:'n',type:'Residential',notes:'Agent intro via Smith & Partners.'},
];
function save(){localStorage.setItem('phx_pipe',JSON.stringify(deals));}
function fmt(n){return n==null?'—':'£'+n.toFixed(1)+'m';}
function mc(m){return m==null?'':(m>=20?'ok':m>=15?'amber':'red');}
function setF(f,btn){filter=f;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('act'));btn.classList.add('act');render();}
function render(){
  const active=deals.filter(d=>d.stage!=='Complete');
  const totalGDV=deals.reduce((s,d)=>s+(d.gdv||0),0);
  const activeGDV=active.reduce((s,d)=>s+(d.gdv||0),0);
  const md=active.filter(d=>d.margin!=null);
  const avgM=md.length?md.reduce((s,d)=>s+d.margin,0)/md.length:null;
  const units=deals.reduce((s,d)=>s+(d.units||0),0);
  const rc={ok:0,amber:0,red:0};deals.forEach(d=>{if(rc[d.risk]!==undefined)rc[d.risk]++;});
  document.getElementById('rollup').innerHTML=`
    <div class="ru"><div class="l">Total GDV</div><div class="v">${fmt(totalGDV)}</div><div class="s">${deals.length} schemes</div></div>
    <div class="ru"><div class="l">Active Pipeline</div><div class="v">${fmt(activeGDV)}</div><div class="s">${active.length} live deals</div></div>
    <div class="ru"><div class="l">Avg Margin</div><div class="v ${avgM!=null?(avgM>=20?'ok':avgM>=15?'amber':'red'):''}'">${avgM!=null?avgM.toFixed(1)+'%':'—'}</div><div class="s">appraisal+ only</div></div>
    <div class="ru"><div class="l">Total Units</div><div class="v">${units}</div><div class="s">all stages</div></div>
    <div class="ru"><div class="l">Risk Profile</div><div class="v" style="font-size:14px;margin-top:10px;display:flex;gap:10px;"><span style="color:var(--ok)">${rc.ok} low</span><span style="color:var(--amber)">${rc.amber} mid</span><span style="color:var(--red)">${rc.red} high</span></div></div>`;
  const board=document.getElementById('board');board.innerHTML='';
  STAGES.forEach(stage=>{
    const sd=deals.filter(d=>{
      if(d.stage!==stage)return false;
      if(filter==='all')return true;
      return d.risk===filter;
    });
    const col=document.createElement('div');col.className='col';
    col.innerHTML=`<div class="col-head"><span class="col-stage">${stage}</span><span class="col-count">${sd.length}</span></div>
    <div class="col-body">${sd.map(d=>`
      <div class="deal r-${d.risk}" onclick="openD(${d.id})">
        <div class="deal-name">${d.name}</div>
        <div class="deal-addr">${d.addr}</div>
        <div class="deal-row">
          <div class="dk"><div class="dl">GDV</div><div class="dv">${fmt(d.gdv)}</div></div>
          <div class="dk"><div class="dl">Margin</div><div class="dv ${mc(d.margin)}">${d.margin!=null?d.margin.toFixed(1)+'%':'—'}</div></div>
        </div>
        <div class="chips"><span class="chip">${d.units} units</span><span class="chip">${d.type}</span></div>
      </div>`).join('')}</div>`;
    board.appendChild(col);
  });
}
function openD(id){
  const d=deals.find(x=>x.id===id);if(!d)return;
  const si=STAGES.indexOf(d.stage);
  document.getElementById('modal').innerHTML=`
    <div class="mhead">
      <div><h3>${d.name}</h3><div style="color:var(--muted);font-family:var(--mono);font-size:11px;margin-top:4px;">${d.addr} · ${d.type} · ${d.units} units</div></div>
      <button class="mclose" onclick="closeM()">×</button>
    </div>
    <div class="mbody">
      <div class="mstats">
        <div class="mstat"><div class="ml">GDV</div><div class="mv">${fmt(d.gdv)}</div></div>
        <div class="mstat"><div class="ml">Margin</div><div class="mv ${mc(d.margin)}">${d.margin!=null?d.margin.toFixed(1)+'%':'—'}</div></div>
        <div class="mstat"><div class="ml">Peak Funding</div><div class="mv">${fmt(d.peak)}</div></div>
      </div>
      <div class="mlabel">Stage Progress</div>
      <div class="stages">${STAGES.map((s,i)=>`<div class="sstep ${i<si?'done':i===si?'act':''}">${s}</div>`).join('')}</div>
      <div class="mlabel">Notes</div>
      <textarea class="ntarea" placeholder="Add notes…" oninput="updN(${id},this.value)">${d.notes||''}</textarea>
      <div class="mbtns">
        <button class="mbtn" ${si===0?'disabled':''} onclick="mvS(${id},-1)">← Back</button>
        <button class="mbtn pri" ${si===STAGES.length-1?'disabled':''} onclick="mvS(${id},1)">Advance →</button>
      </div>
    </div>`;
  document.getElementById('ov').classList.remove('hid');
}
function closeM(e){if(!e||e.target===document.getElementById('ov'))document.getElementById('ov').classList.add('hid');}
function updN(id,val){const d=deals.find(x=>x.id===id);if(d){d.notes=val;save();}}
function mvS(id,dir){
  const d=deals.find(x=>x.id===id);if(!d)return;
  const i=STAGES.indexOf(d.stage);
  d.stage=STAGES[Math.max(0,Math.min(STAGES.length-1,i+dir))];
  save();closeM();render();setTimeout(()=>openD(id),60);
}
function addDeal(){
  const name=prompt('Deal name:');if(!name)return;
  const addr=prompt('Address:')||'';
  deals.push({id:Date.now(),name,addr,stage:'Sourcing',units:0,gdv:0,margin:null,peak:null,risk:'n',type:'Residential',notes:''});
  save();render();
}
render();
</script>
</body>
</html>
