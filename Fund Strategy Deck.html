<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Phoenix — Fund Strategy</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
<style>
deck-stage:not(:defined){visibility:hidden}
*,*::before,*::after{box-sizing:border-box;}
:root{--navy:#0d1f33;--cyan:#2dd4ff;--cyan2:#1fc0e8;--ok:#37e0b0;--amber:#ffba45;--red:#ff5a5a;--ink:#eef6fd;--ink2:#c4ddf1;--muted:#93b4ce;--border:#173251;--border2:#21466d;--sur:#0a1626;--sur2:#0d1d31;--sans:'IBM Plex Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;--serif:'Newsreader',Georgia,serif;}
section{font-family:var(--sans);background:var(--navy);color:var(--ink);position:relative;overflow:hidden;}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.032) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.032) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;}
.glow{position:absolute;border-radius:50%;pointer-events:none;background:radial-gradient(circle,rgba(45,212,255,.18),transparent 62%);}
.pad{padding:80px 100px;position:relative;z-index:1;height:100%;display:flex;flex-direction:column;}
.eyebrow{font-family:var(--mono);font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--cyan);margin-bottom:14px;}
.slide-title{font-family:var(--serif);font-weight:500;font-size:62px;line-height:1.05;letter-spacing:-.5px;margin:0 0 8px;}
.sec-rule{height:2px;width:120px;background:var(--cyan);margin-bottom:36px;border-radius:2px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:40px;flex:1;}
.two-col-60{display:grid;grid-template-columns:1.5fr 1fr;gap:40px;flex:1;}
.slide-num{position:absolute;bottom:40px;right:60px;font-family:var(--mono);font-size:13px;color:rgba(255,255,255,.25);letter-spacing:2px;}
.dtbl{width:100%;border-collapse:collapse;}
.dtbl th{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:600;padding:10px 14px;border-bottom:1px solid var(--border2);text-align:left;}
.dtbl th.r{text-align:right;}
.dtbl td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--ink2);font-size:16px;}
.dtbl td.r{text-align:right;font-family:var(--mono);}
.dtbl td.s{font-weight:600;color:var(--ink);}
.dtbl tr.tot td{font-weight:700;background:rgba(45,212,255,.05);border-top:1px solid var(--border2);font-family:var(--mono);color:var(--cyan);}
.icard{background:var(--sur2);border:1px solid var(--border);border-radius:4px;padding:18px 20px;}
.irow{display:flex;justify-content:space-between;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--border);}
.irow:last-child{border-bottom:none;}
.il{color:var(--ink2);font-size:15px;}
.iv{font-family:var(--mono);font-weight:500;color:var(--ink);}
.iv.ok{color:var(--ok);}
.pillar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;flex:1;}
.pillar{background:var(--sur2);border:1px solid var(--border);border-radius:4px;padding:24px 26px;display:flex;flex-direction:column;gap:12px;position:relative;overflow:hidden;}
.pillar::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.p1::before{background:var(--cyan);}
.p2::before{background:var(--ok);}
.p3::before{background:var(--amber);}
.pillar-num{font-family:var(--mono);font-size:60px;font-weight:500;line-height:1;color:rgba(45,212,255,.1);position:absolute;top:14px;right:18px;}
.p2 .pillar-num{color:rgba(55,224,176,.1);}
.p3 .pillar-num{color:rgba(255,186,69,.1);}
.pillar-title{font-family:var(--serif);font-size:24px;font-weight:500;color:var(--ink);line-height:1.2;}
.pillar p{font-size:15px;color:var(--muted);line-height:1.6;margin:0;}
.pstat{display:flex;gap:20px;padding-top:12px;border-top:1px solid var(--border);margin-top:auto;}
.ps .pl{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
.ps .pv{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--ink);margin-top:3px;}
.team-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.tcard{background:var(--sur2);border:1px solid var(--border);border-radius:4px;padding:20px 22px;}
.tc-init{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;font-family:var(--mono);font-size:16px;font-weight:600;margin-bottom:12px;background:rgba(45,212,255,.1);color:var(--cyan);}
.tc-name{font-size:17px;font-weight:600;color:var(--ink);margin-bottom:4px;}
.tc-role{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.tc-exp{font-size:13px;color:var(--muted);line-height:1.55;}
.proc-step{display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center;}
.proc-dot{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-family:var(--mono);font-size:14px;font-weight:600;border:1px solid var(--border2);position:relative;z-index:1;background:var(--navy);color:var(--muted);}
.proc-dot.done{background:var(--ok);border-color:var(--ok);color:#04141c;box-shadow:0 0 12px rgba(55,224,176,.4);}
.proc-dot.active{background:var(--amber);border-color:var(--amber);color:#04141c;box-shadow:0 0 12px rgba(255,186,69,.4);}
.proc-label{font-size:13px;font-weight:500;color:var(--ink2);}
.proc-sub{font-family:var(--mono);font-size:10px;color:var(--muted);}
.area-chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:2px;}

/* config */
.cfg-tab{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:300;background:var(--sur);border:1px solid var(--border);border-right:none;border-radius:4px 0 0 4px;padding:12px 6px;cursor:pointer;writing-mode:vertical-lr;font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);transition:all .14s;}
.cfg-tab:hover{color:var(--cyan);border-color:var(--cyan);}
.cfg-panel{position:fixed;right:0;top:0;bottom:0;width:340px;background:var(--sur);border-left:1px solid var(--border2);z-index:301;transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column;box-shadow:-8px 0 32px rgba(0,0,0,.5);}
.cfg-panel.open{transform:translateX(0);}
.cfg-head{padding:15px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex:none;}
.cfg-head h3{margin:0;font-family:var(--mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--ink);}
.cfg-x{width:26px;height:26px;display:grid;place-items:center;border:1px solid var(--border);border-radius:4px;background:var(--sur2);color:var(--muted);cursor:pointer;font-size:16px;}
.cfg-x:hover{border-color:var(--red);color:var(--red);}
.cfg-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.cfg-body::-webkit-scrollbar{width:4px;}
.cfg-body::-webkit-scrollbar-thumb{background:var(--border2);}
.cfg-sec{font-family:var(--mono);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--cyan);padding:6px 0;border-bottom:1px solid var(--border);margin-top:6px;}
.cfg-f{display:flex;flex-direction:column;gap:4px;}
.cfg-f label{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);}
.cfg-f input,.cfg-f textarea{background:var(--sur2);border:1px solid var(--border2);color:var(--ink);font-family:var(--mono);font-size:12px;padding:6px 8px;border-radius:3px;width:100%;}
.cfg-f input:focus,.cfg-f textarea:focus{outline:none;border-color:var(--cyan);}
.cfg-f textarea{resize:vertical;min-height:56px;font-family:var(--sans);font-size:12px;line-height:1.5;}
.cfg-foot{padding:12px 16px;border-top:1px solid var(--border);flex:none;}
.cfg-save{width:100%;padding:10px;background:var(--cyan2);border:none;color:#04141c;font-family:var(--mono);font-size:12px;font-weight:700;border-radius:3px;cursor:pointer;}
.cfg-save:hover{background:var(--cyan);}
</style>
</head>
<body>
<div class="cfg-tab" onclick="toggleCfg()">⚙ Edit Data</div>
<div class="cfg-panel" id="cfg">
  <div class="cfg-head"><h3>Fund Data</h3><div class="cfg-x" onclick="toggleCfg()">×</div></div>
  <div class="cfg-body" id="cfg-body"></div>
  <div class="cfg-foot"><button class="cfg-save" onclick="saveCfg()">Save &amp; Update</button></div>
</div>

<deck-stage id="deck" width="1920" height="1080"></deck-stage>

<script>
const STORE = 'phx_fund';
const DEFAULTS = {
  fundName:'Phoenix Development Fund I', company:'Phoenix Development', fundSize:'25', targetIRR:'28–32', targetMOIC:'2.0–2.3', fundTerm:'5', preferredReturn:'8', managementFee:'1.5', carry:'20', minCommitment:'250,000',
  geo1:'West Sussex — primary', geo2:'East Sussex — primary', geo3:'Kent — secondary', geo4:'Surrey — secondary', geo5:'Hampshire — opportunistic',
  p1title:'Buy Consented,\nBuild Fast', p1body:'Only acquire sites with full planning permission in place. No speculative planning risk.', p1s1l:'Min units', p1s1v:'10', p1s2l:'Max GDV', p1s2v:'£35m', p1s3l:'PP only', p1s3v:'100%',
  p2title:'Margin-First\nUnderwriting', p2body:'Every acquisition is stress-tested to a minimum 20% profit on GDV and 30% profit on cost.', p2s1l:'Min margin', p2s1v:'20%', p2s2l:'Bear margin', p2s2v:'≥15%', p2s3l:'Max LTV', p2s3v:'65%',
  p3title:'South East\nSpecialist', p3body:'Deep market knowledge, established contractor and agent relationships and data-driven comparables.', p3s1l:'Schemes done', p3s1v:'', p3s2l:'Avg margin', p3s2v:'', p3s3l:'Track rec.', p3s3v:'',
  tr1name:'', tr1gdv:'', tr1units:'', tr1margin:'', tr1status:'Complete',
  tr2name:'', tr2gdv:'', tr2units:'', tr2margin:'', tr2status:'Active',
  tr3name:'', tr3gdv:'', tr3units:'', tr3margin:'', tr3status:'Active',
  tr4name:'', tr4gdv:'', tr4units:'', tr4margin:'', tr4status:'Sourcing',
  trTotalGDV:'', trRealIRR:'', trMOIC:'', trCapDeployed:'', trSchemes:'',
  tm1init:'', tm1name:'', tm1role:'', tm1bio:'',
  tm2init:'', tm2name:'', tm2role:'', tm2bio:'',
  tm3init:'', tm3name:'', tm3role:'', tm3bio:'',
  tm4init:'', tm4name:'', tm4role:'', tm4bio:'',
  tmExp:'', tmSchemes:'', tmGDV:'', tmUnits:'',
  email:'', phone:'', date:'June 2026', disclaimer:'This presentation is prepared for informational purposes only and does not constitute an offer to invest. Past performance is not a reliable indicator of future results.'
};

let C = {...DEFAULTS, ...JSON.parse(localStorage.getItem(STORE)||'{}')};
const or = (v,fb='—') => (v||'').trim()||fb;
const LOGO = `<svg width="34" height="34" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="5" r="2.4" fill="#2dd4ff"/><circle cx="5" cy="17" r="2.4" fill="#9fb2c4"/><circle cx="19" cy="17" r="2.4" fill="#9fb2c4"/><path d="M12 7L5.5 15.2M12 7l6.5 8.2M6.8 17h10.4" stroke="#56768f" stroke-width="1.5"/></svg>`;
const TOPBAR = `<div style="display:flex;align-items:center;gap:14px;">${LOGO}<span style="font-family:var(--mono);font-weight:600;letter-spacing:4px;font-size:20px;">PHOENIX</span><span style="margin-left:auto;font-family:var(--mono);font-size:10px;letter-spacing:2px;color:#8fd9ee;border:1px solid rgba(143,217,238,.4);padding:4px 12px;border-radius:2px;">CONFIDENTIAL</span></div>`;

function buildSlides(c) {
  const trackRows = [1,2,3,4].filter(i=>c['tr'+i+'name']).map(i=>`<tr><td class="s">${c['tr'+i+'name']}</td><td class="r">${c['tr'+i+'gdv']?'£'+c['tr'+i+'gdv']+'m':'—'}</td><td class="r">${or(c['tr'+i+'units'])}</td><td class="r ${c['tr'+i+'margin']&&parseFloat(c['tr'+i+'margin'])>=20?'ok':''}">${c['tr'+i+'margin']?c['tr'+i+'margin']+'%':'—'}</td><td class="r" style="font-family:var(--mono);font-size:13px;color:var(--muted)">${or(c['tr'+i+'status'])}</td></tr>`).join('');
  const teams = [1,2,3,4].filter(i=>c['tm'+i+'name']).map(i=>`<div class="tcard"><div class="tc-init">${or(c['tm'+i+'init'],'?')}</div><div class="tc-name">${c['tm'+i+'name']}</div><div class="tc-role">${or(c['tm'+i+'role'])}</div><div class="tc-exp">${or(c['tm'+i+'bio'])}</div></div>`).join('');
  const geos = [1,2,3,4,5].filter(i=>c['geo'+i]).map(i=>`<div class="area-chip" style="color:${i<=2?'var(--cyan)':'var(--muted)'}">${c['geo'+i]}</div>`).join('');

  return `
<!-- 01 Cover -->
<section data-screen-label="01 Cover">
  <div class="grid-bg"></div>
  <div class="glow" style="top:-200px;right:-200px;width:700px;height:700px;"></div>
  <div class="glow" style="bottom:-200px;left:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(109,75,214,.16),transparent 62%)"></div>
  <div class="pad" style="justify-content:space-between;">
    ${TOPBAR}
    <div>
      <div style="font-family:var(--mono);font-size:14px;letter-spacing:5px;color:#5fc6e6;text-transform:uppercase;margin-bottom:24px;">Strategy &amp; Fund Overview</div>
      <div style="font-family:var(--serif);font-size:90px;font-weight:500;line-height:.96;color:#fff;letter-spacing:-.8px;margin:0 0 20px;">${(or(c.fundName,'Fund Name')).replace(/\n/g,'<br>')}</div>
      <div style="font-size:21px;color:#9fb2c4;max-width:680px;line-height:1.5;">Residential development — targeting 20%+ margins on consented schemes in undersupplied commuter markets.</div>
    </div>
    <div style="display:flex;gap:60px;padding-top:28px;border-top:1px solid rgba(255,255,255,.1);">
      <div><div style="font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:#6f8497;text-transform:uppercase;">Fund size</div><div style="font-size:18px;color:#dce8f2;margin-top:5px;">${c.fundSize?'£'+c.fundSize+' million':'—'}</div></div>
      <div><div style="font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:#6f8497;text-transform:uppercase;">Target return</div><div style="font-size:18px;color:#dce8f2;margin-top:5px;">${or(c.targetMOIC,'—')}× equity / ${or(c.targetIRR,'—')}% IRR</div></div>
      <div><div style="font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:#6f8497;text-transform:uppercase;">Fund term</div><div style="font-size:18px;color:#dce8f2;margin-top:5px;">${c.fundTerm?c.fundTerm+' years':'—'}</div></div>
      <div><div style="font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:#6f8497;text-transform:uppercase;">Date</div><div style="font-size:18px;color:#dce8f2;margin-top:5px;">${or(c.date,'—')}</div></div>
    </div>
  </div>
  <div class="slide-num">01 / 06</div>
</section>

<!-- 02 Strategy -->
<section data-screen-label="02 Strategy">
  <div class="grid-bg"></div>
  <div class="glow" style="bottom:-180px;right:-180px;width:560px;height:560px;opacity:.5;"></div>
  <div class="pad">
    <div class="eyebrow">Investment Strategy</div>
    <div class="slide-title">Three Pillars</div>
    <div class="sec-rule"></div>
    <div class="pillar-grid">
      <div class="pillar p1"><div class="pillar-num">01</div><div class="pillar-title">${(or(c.p1title,'Pillar One')).replace(/\n/g,'<br>')}</div><p>${or(c.p1body)}</p><div class="pstat"><div class="ps"><div class="pl">${or(c.p1s1l,'Stat 1')}</div><div class="pv">${or(c.p1s1v,'—')}</div></div><div class="ps"><div class="pl">${or(c.p1s2l,'Stat 2')}</div><div class="pv">${or(c.p1s2v,'—')}</div></div><div class="ps"><div class="pl">${or(c.p1s3l,'Stat 3')}</div><div class="pv">${or(c.p1s3v,'—')}</div></div></div></div>
      <div class="pillar p2"><div class="pillar-num">02</div><div class="pillar-title">${(or(c.p2title,'Pillar Two')).replace(/\n/g,'<br>')}</div><p>${or(c.p2body)}</p><div class="pstat"><div class="ps"><div class="pl">${or(c.p2s1l,'Stat 1')}</div><div class="pv" style="color:var(--ok)">${or(c.p2s1v,'—')}</div></div><div class="ps"><div class="pl">${or(c.p2s2l,'Stat 2')}</div><div class="pv">${or(c.p2s2v,'—')}</div></div><div class="ps"><div class="pl">${or(c.p2s3l,'Stat 3')}</div><div class="pv">${or(c.p2s3v,'—')}</div></div></div></div>
      <div class="pillar p3"><div class="pillar-num">03</div><div class="pillar-title">${(or(c.p3title,'Pillar Three')).replace(/\n/g,'<br>')}</div><p>${or(c.p3body)}</p><div class="pstat"><div class="ps"><div class="pl">${or(c.p3s1l,'Stat 1')}</div><div class="pv">${or(c.p3s1v,'—')}</div></div><div class="ps"><div class="pl">${or(c.p3s2l,'Stat 2')}</div><div class="pv" style="color:var(--amber)">${or(c.p3s2v,'—')}</div></div><div class="ps"><div class="pl">${or(c.p3s3l,'Stat 3')}</div><div class="pv">${or(c.p3s3v,'—')}</div></div></div></div>
    </div>
  </div>
  <div class="slide-num">02 / 06</div>
</section>

<!-- 03 Track Record -->
<section data-screen-label="03 Track Record">
  <div class="grid-bg"></div>
  <div class="glow" style="top:-150px;right:-150px;width:500px;height:500px;opacity:.5;"></div>
  <div class="pad">
    <div class="eyebrow">Proven Performance</div>
    <div class="slide-title">Track Record</div>
    <div class="sec-rule"></div>
    <div class="two-col">
      <div>
        <table class="dtbl">
          <thead><tr><th>Scheme</th><th class="r">GDV</th><th class="r">Units</th><th class="r">Margin</th><th class="r">Status</th></tr></thead>
          <tbody>${trackRows||'<tr><td colspan="5" style="color:var(--muted);font-family:var(--mono);font-size:13px;text-align:center;padding:20px;">Add track record via the config panel</td></tr>'}<tr class="tot"><td>Total</td><td class="r">${c.trTotalGDV?'£'+c.trTotalGDV+'m':'—'}</td><td class="r">—</td><td class="r">${c.trRealIRR?c.trRealIRR+'% IRR':'—'}</td><td></td></tr></tbody>
        </table>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px;">
        ${[['Realised IRR',c.trRealIRR?c.trRealIRR+'%':'—','ok'],['Equity MOIC',c.trMOIC?c.trMOIC+'×':'—','ok'],['Capital deployed',c.trCapDeployed?'£'+c.trCapDeployed+'m':'—',''],['Schemes',c.trSchemes||'—','ok']].map(([l,v,s])=>`<div class="icard" style="flex:1;"><div class="irow" style="border:none;"><span class="il">${l}</span><span class="iv ${s}" style="font-size:22px;">${v}</span></div></div>`).join('')}
      </div>
    </div>
  </div>
  <div class="slide-num">03 / 06</div>
</section>

<!-- 04 Fund Terms -->
<section data-screen-label="04 Fund Terms">
  <div class="grid-bg"></div>
  <div class="glow" style="bottom:-150px;left:-150px;width:500px;height:500px;opacity:.5;"></div>
  <div class="pad">
    <div class="eyebrow">Fund I</div>
    <div class="slide-title">Structure &amp; Terms</div>
    <div class="sec-rule"></div>
    <div class="two-col">
      <div class="icard">
        <div style="font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;">Fund overview</div>
        ${[['Fund vehicle','English LP (FCA registered)'],['Fund size',c.fundSize?'£'+c.fundSize+' million LP equity':'—'],['Min. commitment',c.minCommitment?'£'+c.minCommitment:'—'],['Fund term',c.fundTerm?c.fundTerm+' years (+ 2 × 1yr extension)':'—'],['Preferred return',c.preferredReturn?c.preferredReturn+'% pa, compounding':'—'],['Management fee',c.managementFee?c.managementFee+'% pa on committed capital':'—'],['Carry',c.carry?c.carry+'% (above '+c.preferredReturn+'% hurdle)':'—']].map(([l,v])=>`<div class="irow"><span class="il">${l}</span><span class="iv">${v}</span></div>`).join('')}
      </div>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div class="icard">
          <div style="font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;">Return targets</div>
          ${[['Target net IRR',c.targetIRR?c.targetIRR+'%':'—','ok'],['Target net MOIC',c.targetMOIC?c.targetMOIC+'×':'—','ok'],['Preferred return',c.preferredReturn?c.preferredReturn+'% pa':'—','']].map(([l,v,s])=>`<div class="irow"><span class="il">${l}</span><span class="iv ${s}">${v}</span></div>`).join('')}
        </div>
        <div class="icard">
          <div style="font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;">Geography</div>
          <div style="display:flex;flex-direction:column;gap:6px;">${geos||'<span style="color:var(--muted);font-size:13px;">Add geographies via config panel</span>'}</div>
        </div>
      </div>
    </div>
  </div>
  <div class="slide-num">04 / 06</div>
</section>

<!-- 05 Team -->
<section data-screen-label="05 Team">
  <div class="grid-bg"></div>
  <div class="glow" style="bottom:-150px;right:-150px;width:500px;height:500px;opacity:.5;"></div>
  <div class="pad">
    <div class="eyebrow">The Team</div>
    <div class="slide-title">People</div>
    <div class="sec-rule"></div>
    ${teams?`<div class="team-grid">${teams}</div>`:'<div style="color:var(--muted);font-family:var(--mono);font-size:14px;">Add team members via the config panel</div>'}
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:24px;">
      ${[['Combined experience',c.tmExp?c.tmExp+' years':'—'],['Schemes delivered',c.tmSchemes||'—'],['GDV delivered',c.tmGDV?'£'+c.tmGDV+'m+':'—'],['Units delivered',c.tmUnits||'—']].map(([l,v])=>`<div class="icard" style="padding:14px 16px;"><div style="font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;">${l}</div><div style="font-family:var(--mono);font-size:22px;font-weight:500;color:var(--ok)">${v}</div></div>`).join('')}
    </div>
  </div>
  <div class="slide-num">05 / 06</div>
</section>

<!-- 06 Contact -->
<section data-screen-label="06 Contact">
  <div class="grid-bg"></div>
  <div class="glow" style="top:-200px;right:-200px;width:600px;height:600px;"></div>
  <div class="glow" style="bottom:-200px;left:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(55,224,176,.14),transparent 62%)"></div>
  <div class="pad" style="justify-content:center;align-items:center;text-align:center;gap:0;">
    <div style="font-family:var(--mono);font-size:14px;letter-spacing:5px;text-transform:uppercase;color:var(--cyan);margin-bottom:24px;">Next Steps</div>
    <div style="font-family:var(--serif);font-size:80px;font-weight:500;line-height:1.0;color:#fff;margin-bottom:16px;">Let's talk.</div>
    <div style="font-size:20px;color:#9fb2c4;max-width:600px;margin:0 auto 44px;line-height:1.55;">Minimum commitment £${or(c.minCommitment,'—')}. Contact us directly to receive the full Information Memorandum.</div>
    <div style="display:flex;gap:40px;justify-content:center;margin-bottom:44px;">
      ${c.email?`<div style="text-align:center;"><div style="font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:#6f8497;text-transform:uppercase;margin-bottom:6px;">Email</div><div style="font-size:18px;color:var(--cyan)">${c.email}</div></div>`:''}
      ${c.phone?`<div style="text-align:center;"><div style="font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:#6f8497;text-transform:uppercase;margin-bottom:6px;">Phone</div><div style="font-size:18px;color:#dce8f2">${c.phone}</div></div>`:''}
    </div>
    <div style="max-width:680px;font-size:12px;color:#4a5a6a;line-height:1.6;">${c.disclaimer}</div>
  </div>
  <div class="slide-num">06 / 06</div>
</section>`;
}

function render() { document.getElementById('deck').innerHTML = buildSlides(C); }
render();
</script>
<script src="deck-stage.js"></script>
<script>
const FIELDS = [
  {sec:'Fund'},
  {id:'fundName',label:'Fund name'},{id:'company',label:'Company name'},{id:'fundSize',label:'Fund size (£m)'},{id:'targetIRR',label:'Target IRR (e.g. 28–32)'},{id:'targetMOIC',label:'Target MOIC (e.g. 2.0–2.3)'},{id:'fundTerm',label:'Fund term (years)'},{id:'preferredReturn',label:'Preferred return (%)'},{id:'managementFee',label:'Management fee (% pa)'},{id:'carry',label:'Carry (%)'},{id:'minCommitment',label:'Min commitment (e.g. 250,000)'},{id:'date',label:'Presentation date'},
  {sec:'Geographies'},
  {id:'geo1',label:'Geography 1'},{id:'geo2',label:'Geo 2'},{id:'geo3',label:'Geo 3'},{id:'geo4',label:'Geo 4'},{id:'geo5',label:'Geo 5'},
  {sec:'Strategy Pillars'},
  {id:'p1title',label:'Pillar 1 title'},{id:'p1body',label:'Pillar 1 description',textarea:true},{id:'p1s1l',label:'P1 Stat 1 label'},{id:'p1s1v',label:'P1 Stat 1 value'},{id:'p1s2l',label:'P1 Stat 2 label'},{id:'p1s2v',label:'P1 Stat 2 value'},{id:'p1s3l',label:'P1 Stat 3 label'},{id:'p1s3v',label:'P1 Stat 3 value'},
  {id:'p2title',label:'Pillar 2 title'},{id:'p2body',label:'Pillar 2 description',textarea:true},{id:'p2s1l',label:'P2 Stat 1 label'},{id:'p2s1v',label:'P2 Stat 1 value'},{id:'p2s2l',label:'P2 Stat 2 label'},{id:'p2s2v',label:'P2 Stat 2 value'},{id:'p2s3l',label:'P2 Stat 3 label'},{id:'p2s3v',label:'P2 Stat 3 value'},
  {id:'p3title',label:'Pillar 3 title'},{id:'p3body',label:'Pillar 3 description',textarea:true},{id:'p3s1l',label:'P3 Stat 1 label'},{id:'p3s1v',label:'P3 Stat 1 value'},{id:'p3s2l',label:'P3 Stat 2 label'},{id:'p3s2v',label:'P3 Stat 2 value'},{id:'p3s3l',label:'P3 Stat 3 label'},{id:'p3s3v',label:'P3 Stat 3 value'},
  {sec:'Track Record'},
  {id:'tr1name',label:'Scheme 1 name'},{id:'tr1gdv',label:'S1 GDV (£m)'},{id:'tr1units',label:'S1 units'},{id:'tr1margin',label:'S1 margin (%)'},{id:'tr1status',label:'S1 status'},
  {id:'tr2name',label:'Scheme 2 name'},{id:'tr2gdv',label:'S2 GDV'},{id:'tr2units',label:'S2 units'},{id:'tr2margin',label:'S2 margin'},{id:'tr2status',label:'S2 status'},
  {id:'tr3name',label:'Scheme 3 name'},{id:'tr3gdv',label:'S3 GDV'},{id:'tr3units',label:'S3 units'},{id:'tr3margin',label:'S3 margin'},{id:'tr3status',label:'S3 status'},
  {id:'tr4name',label:'Scheme 4 name'},{id:'tr4gdv',label:'S4 GDV'},{id:'tr4units',label:'S4 units'},{id:'tr4margin',label:'S4 margin'},{id:'tr4status',label:'S4 status'},
  {id:'trTotalGDV',label:'Total portfolio GDV (£m)'},{id:'trRealIRR',label:'Realised IRR (%)'},{id:'trMOIC',label:'Equity MOIC (×)'},{id:'trCapDeployed',label:'Capital deployed (£m)'},{id:'trSchemes',label:'Schemes delivered'},
  {sec:'Team'},
  {id:'tm1init',label:'Person 1 initials'},{id:'tm1name',label:'P1 name'},{id:'tm1role',label:'P1 role'},{id:'tm1bio',label:'P1 bio',textarea:true},
  {id:'tm2init',label:'Person 2 initials'},{id:'tm2name',label:'P2 name'},{id:'tm2role',label:'P2 role'},{id:'tm2bio',label:'P2 bio',textarea:true},
  {id:'tm3init',label:'Person 3 initials'},{id:'tm3name',label:'P3 name'},{id:'tm3role',label:'P3 role'},{id:'tm3bio',label:'P3 bio',textarea:true},
  {id:'tm4init',label:'Person 4 initials'},{id:'tm4name',label:'P4 name'},{id:'tm4role',label:'P4 role'},{id:'tm4bio',label:'P4 bio',textarea:true},
  {id:'tmExp',label:'Combined experience (years)'},{id:'tmSchemes',label:'Schemes delivered'},{id:'tmGDV',label:'GDV delivered (£m)'},{id:'tmUnits',label:'Units delivered'},
  {sec:'Contact'},
  {id:'email',label:'Email'},{id:'phone',label:'Phone'},{id:'disclaimer',label:'Disclaimer text',textarea:true}
];

function buildPanel(){return FIELDS.map(f=>{if(f.sec)return`<div class="cfg-sec">${f.sec}</div>`;if(f.textarea)return`<div class="cfg-f"><label>${f.label}</label><textarea id="cf_${f.id}">${C[f.id]||''}</textarea></div>`;return`<div class="cfg-f"><label>${f.label}</label><input id="cf_${f.id}" value="${(C[f.id]||'').toString().replace(/"/g,'&quot;')}"></div>`;}).join('');}
function toggleCfg(){const p=document.getElementById('cfg');const op=!p.classList.contains('open');if(op)document.getElementById('cfg-body').innerHTML=buildPanel();p.classList.toggle('open');}
function saveCfg(){FIELDS.filter(f=>f.id).forEach(f=>{const el=document.getElementById('cf_'+f.id);if(el)C[f.id]=el.value;});localStorage.setItem(STORE,JSON.stringify(C));const old=document.getElementById('deck');const neo=document.createElement('deck-stage');neo.setAttribute('id','deck');neo.setAttribute('width','1920');neo.setAttribute('height','1080');neo.innerHTML=buildSlides(C);old.replaceWith(neo);toggleCfg();}
</script>
</body>
