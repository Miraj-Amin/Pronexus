<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Phoenix — Investor Pitch</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap" rel="stylesheet">
<style>
deck-stage:not(:defined){visibility:hidden}
*,*::before,*::after{box-sizing:border-box;}
:root{--navy:#0d1f33;--cyan:#2dd4ff;--cyan2:#1fc0e8;--ok:#37e0b0;--amber:#ffba45;--red:#ff5a5a;--ink:#eef6fd;--ink2:#c4ddf1;--muted:#93b4ce;--border:#173251;--border2:#21466d;--sur:#0a1626;--sur2:#0d1d31;--sans:'IBM Plex Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;--serif:'Newsreader',Georgia,serif;}
section{font-family:var(--sans);background:var(--navy);color:var(--ink);position:relative;overflow:hidden;}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;}
.glow{position:absolute;border-radius:50%;pointer-events:none;background:radial-gradient(circle,rgba(45,212,255,.18),transparent 62%);}
.pad{padding:80px 100px;position:relative;z-index:1;height:100%;display:flex;flex-direction:column;}
.eyebrow{font-family:var(--mono);font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--cyan);margin-bottom:14px;}
.slide-title{font-family:var(--serif);font-weight:500;font-size:62px;line-height:1.05;letter-spacing:-.5px;margin:0 0 8px;}
.sec-rule{height:2px;width:120px;background:var(--cyan);margin-bottom:36px;border-radius:2px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:40px;flex:1;}
.two-col-60{display:grid;grid-template-columns:1.5fr 1fr;gap:40px;flex:1;}
.slide-num{position:absolute;bottom:40px;right:60px;font-family:var(--mono);font-size:13px;color:rgba(255,255,255,.25);letter-spacing:2px;}
.kpi-g{display:grid;gap:16px;}
.g4{grid-template-columns:repeat(4,1fr);}
.g3{grid-template-columns:repeat(3,1fr);}
.g2{grid-template-columns:repeat(2,1fr);}
.kpi{background:linear-gradient(180deg,var(--sur2),var(--sur));border:1px solid var(--border);padding:24px 28px;position:relative;}
.kpi::before,.kpi::after{content:'';position:absolute;width:9px;height:9px;border-color:var(--cyan);opacity:.5;}
.kpi::before{top:-1px;left:-1px;border-top:1px solid;border-left:1px solid;}
.kpi::after{bottom:-1px;right:-1px;border-bottom:1px solid;border-right:1px solid;}
.kpi.ok::before,.kpi.ok::after{border-color:var(--ok);}
.kpi.amber::before,.kpi.amber::after{border-color:var(--amber);}
.kpi .kl{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);}
.kpi .kv{font-family:var(--mono);font-size:46px;font-weight:500;letter-spacing:-.8px;margin-top:14px;color:var(--ink);line-height:1;}
.kpi.ok .kv{color:var(--ok);}
.kpi.amber .kv{color:var(--amber);}
.kpi .ks{font-size:14px;color:var(--muted);margin-top:10px;font-family:var(--mono);}
.kpi .kt{position:absolute;top:18px;right:18px;font-family:var(--mono);font-size:11px;color:var(--muted);border:1px solid var(--border2);padding:2px 8px;}
.dtbl{width:100%;border-collapse:collapse;}
.dtbl th{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);font-weight:600;padding:10px 14px;border-bottom:1px solid var(--border2);text-align:left;}
.dtbl th.r{text-align:right;}
.dtbl td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--ink2);font-size:16px;}
.dtbl td.r{text-align:right;font-family:var(--mono);}
.dtbl td.s{font-weight:600;color:var(--ink);}
.dtbl tr.tot td{font-weight:700;background:rgba(45,212,255,.05);border-top:1px solid var(--border2);font-family:var(--mono);color:var(--cyan);}
.wf{display:flex;flex-direction:column;gap:4px;}
.wf-r{display:grid;grid-template-columns:1fr 160px;padding:10px 14px;border-radius:2px;}
.wf-r .wl{font-size:16px;color:var(--ink2);}
.wf-r .wv{font-family:var(--mono);font-size:16px;text-align:right;}
.wf-r.pos .wv{color:var(--ok);}
.wf-r.res{background:rgba(45,212,255,.07);border:1px solid var(--border);}
.wf-r.res .wl{color:var(--cyan);font-weight:600;}
.wf-r.res .wv{color:var(--cyan);font-weight:700;}
.sc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.sc-card{border:1px solid var(--border);border-radius:4px;padding:20px 22px;}
.sc-card.base{border-color:rgba(45,212,255,.4);}
.sc-card.opt{border-color:rgba(55,224,176,.35);}
.sc-card.bear{border-color:rgba(255,90,90,.3);}
.sc-tag{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:2px;display:inline-block;margin-bottom:14px;}
.base .sc-tag{background:rgba(45,212,255,.1);color:var(--cyan);border:1px solid rgba(45,212,255,.3);}
.opt .sc-tag{background:rgba(55,224,176,.1);color:var(--ok);border:1px solid rgba(55,224,176,.3);}
.bear .sc-tag{background:rgba(255,90,90,.08);color:var(--red);border:1px solid rgba(255,90,90,.25);}
.sc-mv{font-family:var(--mono);font-size:32px;font-weight:500;letter-spacing:-.4px;margin-top:8px;}
.sc-mv.ok{color:var(--ok);}
.sc-mv.amber{color:var(--amber);}
.sc-mv.red{color:var(--red);}
.info-row{display:flex;gap:40px;padding-top:28px;border-top:1px solid rgba(255,255,255,.1);}
.info-item{display:flex;flex-direction:column;gap:5px;}
.il{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:#6f8497;text-transform:uppercase;}
.iv{font-size:17px;color:#dce8f2;}
.steps-list{display:flex;flex-direction:column;gap:0;}
.step-item{display:grid;grid-template-columns:60px 1fr;gap:20px;padding:22px 0;border-bottom:1px solid var(--border);}
.step-item:last-child{border-bottom:none;}
.step-n{width:40px;height:40px;border-radius:50%;background:rgba(45,212,255,.1);border:1px solid rgba(45,212,255,.35);display:grid;place-items:center;color:var(--cyan);font-family:var(--mono);font-size:18px;font-weight:600;}
.step-body h4{margin:0 0 4px;font-size:20px;font-weight:600;color:var(--ink);}
.step-body p{margin:0;font-size:16px;color:var(--muted);line-height:1.5;}

/* config panel */
.cfg-tab{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:300;background:var(--sur);border:1px solid var(--border);border-right:none;border-radius:4px 0 0 4px;padding:12px 6px;cursor:pointer;writing-mode:vertical-lr;font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);transition:all .14s;}
.cfg-tab:hover{color:var(--cyan);border-color:var(--cyan);}
.cfg-panel{position:fixed;right:0;top:0;bottom:0;width:340px;background:var(--sur);border-left:1px solid var(--border2);z-index:301;transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column;box-shadow:-8px 0 32px rgba(0,0,0,.5);}
.cfg-panel.open{transform:translateX(0);}
.cfg-head{padding:15px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex:none;}
.cfg-head h3{margin:0;font-family:var(--mono);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--ink);}
.cfg-x{width:26px;height:26px;display:grid;place-items:center;border:1px solid var(--border);border-radius:4px;background:var(--sur2);color:var(--muted);cursor:pointer;font-size:16px;}
.cfg-x:hover{border-color:var(--red);color:var(--red);}
.cfg-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.cfg-body::-webkit-scrollbar{width:4px;}
.cfg-body::-webkit-scrollbar-thumb{background:var(--border2);}
.cfg-sec{font-family:var(--mono);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--cyan);padding:6px 0 6px;border-bottom:1px solid var(--border);margin-top:6px;}
.cfg-f{display:flex;flex-direction:column;gap:4px;}
.cfg-f label{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);}
.cfg-f input,.cfg-f select,.cfg-f textarea{background:var(--sur2);border:1px solid var(--border2);color:var(--ink);font-family:var(--mono);font-size:12px;padding:6px 8px;border-radius:3px;width:100%;}
.cfg-f input:focus,.cfg-f textarea:focus{outline:none;border-color:var(--cyan);}
.cfg-f textarea{resize:vertical;min-height:56px;font-family:var(--sans);font-size:12px;line-height:1.5;}
.cfg-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cfg-foot{padding:12px 16px;border-top:1px solid var(--border);flex:none;}
.cfg-save{width:100%;padding:10px;background:var(--cyan2);border:none;color:#04141c;font-family:var(--mono);font-size:12px;font-weight:700;border-radius:3px;cursor:pointer;}
.cfg-save:hover{background:var(--cyan);}
</style>
</head>
<body>

<div class="cfg-tab" onclick="toggleCfg()">⚙ Edit Data</div>
<div class="cfg-panel" id="cfg">
  <div class="cfg-head"><h3>Project Data</h3><div class="cfg-x" onclick="toggleCfg()">×</div></div>
  <div class="cfg-body" id="cfg-body"></div>
  <div class="cfg-foot"><button class="cfg-save" onclick="saveCfg()">Save &amp; Update</button></div>
</div>

<deck-stage id="deck" width="1920" height="1080"></deck-stage>

<script>
const STORE = 'phx_pitch';
const DEFAULTS = {
  name:'Your Scheme Name', address:'Town, County', lpa:'District Council',
  planningRef:'REF/000/0000', planningStatus:'Full planning permission granted',
  units:'', unitMix:'', netArea:'', programme:'24', date:'',
  loc1:'min to central London by rail', loc2:'Town centre walkable',
  loc3:'Outstanding schools nearby', loc4:'Active buyer demand',
  gdv:'', land:'', landAcq:'', build:'', profFees:'', contingency:'',
  sales:'', finance:'', other:'', totalCost:'', profit:'',
  profitPctGdv:'', profitExFin:'', peakFunding:'', ltv:'', ltc:'',
  equityTotal:'', investorPct:'80', devPct:'20', preferredReturn:'10',
  profitSplit:'60% investor / 40% developer', seniorDebt:'', seniorRate:'9',
  equityMultiple:'', irr:'', investorProceeds:'',
  company:'Phoenix Development', email:'deals@phoenixdev.co.uk', phone:'+44 20 7000 0000',
  disclaimer:'This presentation is prepared for discussion purposes only and does not constitute a formal offer to invest. All figures are appraisal estimates.'
};

let C = {...DEFAULTS, ...JSON.parse(localStorage.getItem(STORE)||'{}')};

const fm = n => { const v=parseFloat(n); return v?'£'+v.toFixed(2)+'m':'—'; };
const fp = n => { const v=parseFloat(n); return v?v.toFixed(1)+'%':'—'; };
const fv = n => { const v=parseFloat(n); return v?v.toFixed(2)+'×':'—'; };
const sev = n => { const v=parseFloat(n); return v>=20?'ok':v>=15?'amber':'red'; };
const or = (v,fb) => v||fb;

const LOGO = `<svg width="34" height="34" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="5" r="2.4" fill="#2dd4ff"/><circle cx="5" cy="17" r="2.4" fill="#9fb2c4"/><circle cx="19" cy="17" r="2.4" fill="#9fb2c4"/><path d="M12 7L5.5 15.2M12 7l6.5 8.2M6.8 17h10.4" stroke="#56768f" stroke-width="1.5"/></svg>`;
const TOPBAR = `<div style="display:flex;align-items:center;gap:14px;">${LOGO}<span style="font-family:var(--mono);font-weight:600;letter-spacing:4px;font-size:20px;">PHOENIX</span><span style="margin-left:auto;font-family:var(--mono);font-size:10px;letter-spacing:2px;color:#8fd9ee;border:1px solid rgba(143,217,238,.4);padding:4px 12px;border-radius:2px;">INVESTOR PRESENTATION</span></div>`;

function sensitivityVal(gdvStep, costStep) {
  const g = parseFloat(C.gdv)*(1+gdvStep/100);
  const tc = parseFloat(C.totalCost)*(1+costStep/100);
  if(!g||!tc) return null;
  return (g-tc)/g*100;
}
function heatCell(m,isBase){
  if(m===null) return `<td style="padding:7px 4px;text-align:center;background:var(--border);color:var(--muted);border-radius:2px;font-size:9px;">—</td>`;
  const bg = m>=22?'#37e0b0':m>=18?'#a8e6b0':m>=14?'#ffce74':m>=10?'#ffba45':'#ff7070';
  const outline = isBase?'outline:2px solid #2dd4ff;outline-offset:-1px;':'';
  return `<td style="padding:7px 4px;text-align:center;background:${bg};color:rgba(5,12,24,.9);border-radius:2px;font-weight:700;font-size:9px;${outline}">${m.toFixed(1)}%</td>`;
}

function buildSlides(c) {
  const gdvSteps=[-10,-5,0,5,10], costSteps=[-10,-5,0,5,10];
  const heatRows = costSteps.map(cs=>`<tr><th style="color:var(--muted);font-size:11px;text-align:right;padding:4px 8px">${cs>0?'+':''}${cs}%<br>cost</th>${gdvSteps.map(gs=>heatCell(sensitivityVal(gs,cs),gs===0&&cs===0)).join('')}</tr>`).join('');
  const heatHead = `<tr><td></td>${gdvSteps.map(g=>`<th style="color:var(--muted);font-size:11px;padding:4px 6px;text-align:center">${g>0?'+':''}${g}%<br>GDV</th>`).join('')}</tr>`;

  return `
<!-- 01 Cover -->
<section data-screen-label="01 Cover">
  <div class="grid-bg"></div>
  <div class="glow" style="top:-200px;right:-200px;width:700px;height:700px;"></div>
  <div class="glow" style="bottom:-200px;left:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(109,75,214,.16),transparent 62%)"></div>
  <div class="pad" style="justify-content:space-between;">
    ${TOPBAR}
    <div>
      <div style="font-family:var(--mono);font-size:14px;letter-spacing:5px;color:#5fc6e6;text-transform:uppercase;margin-bottom:24px;">Development Opportunity</div>
      <div style="font-family:var(--serif);font-size:88px;font-weight:500;line-height:.96;color:#fff;letter-spacing:-.8px;margin:0 0 20px;">${or(c.name,'Your Scheme Name')}</div>
      <div style="font-size:22px;color:#9fb2c4;max-width:700px;line-height:1.5;margin-bottom:44px;">${or(c.units,'—')}-unit ${or(c.unitMix,'residential')} development · ${or(c.address,'location')} · targeting ${fp(c.profitPctGdv)} profit on GDV.</div>
    </div>
    <div class="info-row">
      <div class="info-item"><div class="il">GDV</div><div class="iv">${fm(c.gdv)}</div></div>
      <div class="info-item"><div class="il">Profit % GDV</div><div class="iv">${fp(c.profitPctGdv)}</div></div>
      <div class="info-item"><div class="il">Peak Funding</div><div class="iv">${fm(c.peakFunding)}</div></div>
      <div class="info-item"><div class="il">Programme</div><div class="iv">${or(c.programme,'—')} months</div></div>
      <div class="info-item"><div class="il">Date</div><div class="iv">${or(c.date,'—')}</div></div>
    </div>
  </div>
  <div class="slide-num">01 / 07</div>
</section>

<!-- 02 Opportunity -->
<section data-screen-label="02 Opportunity">
  <div class="grid-bg"></div>
  <div class="glow" style="top:-150px;left:-150px;width:500px;height:500px;opacity:.6;"></div>
  <div class="pad">
    <div class="eyebrow">The Opportunity</div>
    <div class="slide-title">Site &amp; Planning</div>
    <div class="sec-rule"></div>
    <div class="two-col-60">
      <table class="dtbl">
        <tbody>
          <tr><td class="s">Address</td><td class="r">${or(c.address,'—')}</td></tr>
          <tr><td class="s">LPA</td><td class="r">${or(c.lpa,'—')}</td></tr>
          <tr><td class="s">Planning reference</td><td class="r">${or(c.planningRef,'—')}</td></tr>
          <tr><td class="s">Planning status</td><td class="r" style="color:var(--ok)">${or(c.planningStatus,'—')}</td></tr>
          <tr><td class="s">Scheme</td><td class="r">${or(c.units,'—')} units${c.unitMix?' — '+c.unitMix:''}</td></tr>
          <tr><td class="s">Net saleable area</td><td class="r">${c.netArea?parseFloat(c.netArea).toLocaleString()+' sqft':'—'}</td></tr>
          <tr><td class="s">Programme</td><td class="r">${c.programme||'—'} months</td></tr>
        </tbody>
      </table>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="background:rgba(45,212,255,.04);border:1px dashed var(--border);flex:1;display:grid;place-items:center;color:var(--muted);font-family:var(--mono);font-size:13px;min-height:280px;text-align:center;line-height:2;">site plan /<br>aerial photo</div>
        <div style="background:var(--sur2);border:1px solid var(--border);padding:18px 20px;border-radius:4px;">
          <div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;">Location highlights</div>
          <div style="display:flex;flex-direction:column;gap:9px;font-size:15px;color:var(--ink2);">
            <div>✓ &nbsp;${or(c.loc1,'—')}</div>
            <div>✓ &nbsp;${or(c.loc2,'—')}</div>
            <div>✓ &nbsp;${or(c.loc3,'—')}</div>
            <div>✓ &nbsp;${or(c.loc4,'—')}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="slide-num">02 / 07</div>
</section>

<!-- 03 Financials -->
<section data-screen-label="03 Financials">
  <div class="grid-bg"></div>
  <div class="glow" style="bottom:-180px;right:-180px;width:560px;height:560px;opacity:.5;"></div>
  <div class="pad">
    <div class="eyebrow">Financial Summary</div>
    <div class="slide-title">Appraisal Overview</div>
    <div class="sec-rule"></div>
    <div class="two-col">
      <table class="dtbl">
        <thead><tr><th>Cost Category</th><th class="r">£m</th><th class="r">% GDV</th></tr></thead>
        <tbody>
          ${[['Land &amp; acquisition',c.land||0],[`Construction (net)`,c.build||0],['Professional fees',c.profFees||0],['Contingency',c.contingency||0],['Sales &amp; marketing',c.sales||0],['Finance',c.finance||0],['Other',c.other||0]].map(([l,v])=>{const pv=parseFloat(v)||0,gdv=parseFloat(c.gdv)||1;return `<tr><td>${l}</td><td class="r">${pv?pv.toFixed(2):'—'}</td><td class="r">${pv&&gdv?(pv/gdv*100).toFixed(1)+'%':'—'}</td></tr>`;}).join('')}
          <tr class="tot"><td>Total cost</td><td class="r">${parseFloat(c.totalCost)?parseFloat(c.totalCost).toFixed(2):'—'}</td><td class="r">${parseFloat(c.totalCost)&&parseFloat(c.gdv)?(parseFloat(c.totalCost)/parseFloat(c.gdv)*100).toFixed(1)+'%':'—'}</td></tr>
          <tr class="tot" style="background:rgba(55,224,176,.08)"><td style="color:var(--ok)">Project profit</td><td class="r" style="color:var(--ok)">${parseFloat(c.profit)?parseFloat(c.profit).toFixed(2):'—'}</td><td class="r" style="color:var(--ok)">${fp(c.profitPctGdv)}</td></tr>
        </tbody>
      </table>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div class="kpi-g g2" style="gap:12px;">
          <div class="kpi ${sev(c.profitPctGdv)}"><div class="kl">Profit % GDV</div><div class="kv" style="font-size:36px;">${fp(c.profitPctGdv)}</div><div class="ks">≥20% target</div></div>
          <div class="kpi ${sev(c.profitExFin)}"><div class="kl">Profit % Cost</div><div class="kv" style="font-size:36px;">${fp(c.profitExFin)}</div><div class="ks">excl. finance</div></div>
          <div class="kpi"><div class="kl">GDV</div><div class="kv" style="font-size:36px;">${fm(c.gdv)}</div><div class="ks">${or(c.units,'—')} units</div></div>
          <div class="kpi"><div class="kl">Peak Funding</div><div class="kv" style="font-size:36px;">${fm(c.peakFunding)}</div><div class="ks">${fp(c.ltv)} LTV</div></div>
        </div>
        <div style="background:var(--sur2);border:1px solid rgba(55,224,176,.35);border-left:3px solid var(--ok);padding:18px 20px;">
          <div style="font-family:var(--mono);font-size:11px;color:var(--ok);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;">Appraisal validated</div>
          <div style="font-size:15px;color:var(--ink2);">Margin above 20% threshold. Lender margin ${fp(c.profitExFin)} above 30% floor. Funding waterfall reconciles to zero.</div>
        </div>
      </div>
    </div>
  </div>
  <div class="slide-num">03 / 07</div>
</section>

<!-- 04 Returns -->
<section data-screen-label="04 Returns">
  <div class="grid-bg"></div>
  <div class="glow" style="top:-150px;left:-150px;width:500px;height:500px;opacity:.5;"></div>
  <div class="pad">
    <div class="eyebrow">Investor Returns</div>
    <div class="slide-title">Return on Equity</div>
    <div class="sec-rule"></div>
    <div class="kpi-g g4" style="margin-bottom:40px;">
      <div class="kpi ok"><div class="kl">Project Profit</div><div class="kv">${fm(c.profit)}</div><div class="ks">GDV − total cost</div></div>
      <div class="kpi ok"><div class="kl">Return on Equity</div><div class="kv">${fv(c.equityMultiple)}</div><div class="ks">${fm(c.equityTotal)} equity</div></div>
      <div class="kpi ok"><div class="kl">Equity IRR (est.)</div><div class="kv">${fp(c.irr)}</div><div class="ks">${or(c.programme,'—')}-month programme</div></div>
      <div class="kpi"><div class="kl">Equity Required</div><div class="kv">${fm(c.equityTotal)}</div><div class="ks">Day-one commitment</div></div>
    </div>
    <div class="wf">
      <div style="font-family:var(--mono);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;">Sources &amp; Uses</div>
      <div class="wf-r pos"><div class="wl">GDV (gross sales proceeds)</div><div class="wv">+${fm(c.gdv)}</div></div>
      <div class="wf-r"><div class="wl">Less: total cost</div><div class="wv">−${fm(c.totalCost)}</div></div>
      <div class="wf-r"><div class="wl">Less: senior debt repayment</div><div class="wv">−${fm(c.seniorDebt)}</div></div>
      <div class="wf-r pos"><div class="wl">Equity returned</div><div class="wv">+${fm(c.equityTotal)}</div></div>
      <div class="wf-r res"><div class="wl">Net investor return</div><div class="wv">${fm(c.investorProceeds)}</div></div>
    </div>
  </div>
  <div class="slide-num">04 / 07</div>
</section>

<!-- 05 Sensitivity -->
<section data-screen-label="05 Sensitivity">
  <div class="grid-bg"></div>
  <div class="glow" style="bottom:-180px;right:-180px;width:560px;height:560px;opacity:.4;"></div>
  <div class="pad">
    <div class="eyebrow">Risk Analysis</div>
    <div class="slide-title">Sensitivity &amp; Downside</div>
    <div class="sec-rule"></div>
    <div class="two-col">
      <div>
        <div style="font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:14px;">Margin % GDV — sale price × build cost shift</div>
        <table style="border-collapse:separate;border-spacing:4px;font-family:var(--mono);font-size:13px;width:100%;">
          ${heatHead}${heatRows}
        </table>
        <div style="display:flex;gap:16px;margin-top:14px;font-family:var(--mono);font-size:11px;color:var(--muted);">
          <span style="color:var(--red)">■ &lt;15%</span><span style="color:var(--amber)">■ 15–20%</span><span style="color:var(--ok)">■ 20%+</span><span style="color:var(--cyan)">■ Base</span>
        </div>
      </div>
      <div class="sc-grid" style="grid-template-columns:1fr;gap:14px;">
        <div class="sc-card base"><span class="sc-tag">Base Case</span><div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;">Profit % GDV</div><div class="sc-mv ok">${fp(c.profitPctGdv)}</div><div style="font-size:14px;color:var(--muted);margin-top:8px;">GDV and costs as modelled. Programme ${or(c.programme,'—')} months.</div></div>
        <div class="sc-card opt"><span class="sc-tag">Upside (+5% GDV)</span><div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;">Profit % GDV</div><div class="sc-mv ok">${sensitivityVal(5,0)!==null?(sensitivityVal(5,0)).toFixed(1)+'%':'—'}</div><div style="font-size:14px;color:var(--muted);margin-top:8px;">Sales values 5% above assumption.</div></div>
        <div class="sc-card bear"><span class="sc-tag">Bear (−8% GDV / +8% cost)</span><div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;">Profit % GDV</div><div class="sc-mv ${sensitivityVal(-8,8)!==null&&sensitivityVal(-8,8)>=15?'amber':'red'}">${sensitivityVal(-8,8)!==null?sensitivityVal(-8,8).toFixed(1)+'%':'—'}</div><div style="font-size:14px;color:var(--muted);margin-top:8px;">Scheme remains profitable. Equity returned in full.</div></div>
      </div>
    </div>
  </div>
  <div class="slide-num">05 / 07</div>
</section>

<!-- 06 Deal Structure -->
<section data-screen-label="06 Deal Structure">
  <div class="grid-bg"></div>
  <div class="glow" style="top:-150px;left:-150px;width:500px;height:500px;opacity:.5;"></div>
  <div class="pad">
    <div class="eyebrow">Investment Structure</div>
    <div class="slide-title">Proposed Terms</div>
    <div class="sec-rule"></div>
    <div class="two-col">
      <table class="dtbl">
        <thead><tr><th>Term</th><th class="r">Detail</th></tr></thead>
        <tbody>
          <tr><td class="s">Total equity required</td><td class="r">${fm(c.equityTotal)}</td></tr>
          <tr><td class="s">Investor equity</td><td class="r">${fm(c.investorEquity||parseFloat(c.equityTotal)*parseFloat(c.investorPct)/100)} (${or(c.investorPct,'—')}%)</td></tr>
          <tr><td class="s">Developer equity</td><td class="r">${fm(c.devEquity||parseFloat(c.equityTotal)*parseFloat(c.devPct)/100)} (${or(c.devPct,'—')}%)</td></tr>
          <tr><td class="s">Profit split (after pref)</td><td class="r">${or(c.profitSplit,'—')}</td></tr>
          <tr><td class="s">Preferred return</td><td class="r">${or(c.preferredReturn,'—')}% pa on invested equity</td></tr>
          <tr><td class="s">Senior debt (proposed)</td><td class="r">${fm(c.seniorDebt)} at ${or(c.seniorRate,'—')}% all-in</td></tr>
          <tr><td class="s">Investment period</td><td class="r">${or(c.programme,'—')} months from exchange</td></tr>
        </tbody>
      </table>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div style="background:var(--sur2);border:1px solid var(--border);border-radius:4px;padding:22px 24px;">
          <div style="font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:14px;">Investor return summary</div>
          <div style="display:flex;flex-direction:column;gap:12px;">
            <div style="display:flex;justify-content:space-between;"><span style="color:var(--ink2)">Capital returned</span><span style="font-family:var(--mono)">${fm(c.investorEquity||parseFloat(c.equityTotal)*parseFloat(c.investorPct)/100)}</span></div>
            <div style="display:flex;justify-content:space-between;"><span style="color:var(--ink2)">Preferred return</span><span style="font-family:var(--mono)">${or(c.preferredReturn,'—')}% pa</span></div>
            <div style="border-top:1px solid var(--border2);padding-top:12px;display:flex;justify-content:space-between;"><span style="font-weight:600;color:var(--ink)">Total proceeds</span><span style="font-family:var(--mono);font-size:20px;font-weight:600;color:var(--ok)">${fm(c.investorProceeds)}</span></div>
          </div>
        </div>
        <div style="background:rgba(45,212,255,.05);border:1px solid rgba(45,212,255,.25);border-left:3px solid var(--cyan);padding:18px 20px;">
          <div style="font-size:15px;color:var(--ink2);">Estimated equity multiple of <strong style="color:var(--cyan)">${fv(c.equityMultiple)}</strong> and IRR of <strong style="color:var(--cyan)">${fp(c.irr)}</strong> over the ${or(c.programme,'—')}-month programme.</div>
        </div>
      </div>
    </div>
  </div>
  <div class="slide-num">06 / 07</div>
</section>

<!-- 07 Next Steps -->
<section data-screen-label="07 Next Steps">
  <div class="grid-bg"></div>
  <div class="glow" style="bottom:-180px;right:-180px;width:560px;height:560px;opacity:.5;"></div>
  <div class="pad">
    <div class="eyebrow">Moving Forward</div>
    <div class="slide-title">Next Steps</div>
    <div class="sec-rule"></div>
    <div class="two-col-60">
      <div class="steps-list">
        <div class="step-item"><div class="step-n">1</div><div class="step-body"><h4>Heads of Terms</h4><p>Agree investment HoTs — equity split, preferred return, exit mechanism. Target: within 2 weeks.</p></div></div>
        <div class="step-item"><div class="step-n">2</div><div class="step-body"><h4>Legal &amp; Structuring</h4><p>Instruct solicitors to prepare SPV documentation and investment agreement. Title investigation to run in parallel.</p></div></div>
        <div class="step-item"><div class="step-n">3</div><div class="step-body"><h4>Funding Mandate</h4><p>Submit appraisal and planning docs to proposed senior lender.</p></div></div>
        <div class="step-item"><div class="step-n">4</div><div class="step-body"><h4>Exchange &amp; Drawdown</h4><p>Equity drawdown day 1; debt facility available from construction start.</p></div></div>
      </div>
      <div style="background:var(--sur2);border:1px solid var(--border);border-radius:6px;padding:32px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;">
        <div style="font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);">Contact</div>
        <div style="font-family:var(--serif);font-size:28px;color:var(--ink);">${or(c.company,'Phoenix Development')}</div>
        <div style="font-family:var(--mono);font-size:15px;color:var(--cyan);">${or(c.email,'—')}</div>
        <div style="font-family:var(--mono);font-size:14px;color:var(--ink2);">${or(c.phone,'—')}</div>
        <div style="height:1px;background:var(--border);width:100%;margin:4px 0;"></div>
        <div style="font-size:12px;color:var(--muted);line-height:1.65;">${c.disclaimer}</div>
      </div>
    </div>
  </div>
  <div class="slide-num">07 / 07</div>
</section>`;
}

function render() {
  document.getElementById('deck').innerHTML = buildSlides(C);
}
render();
</script>
<script src="deck-stage.js"></script>
<script>
// Config panel
const FIELDS = [
  {sec:'Scheme Details'},
  {id:'name',label:'Scheme name'},{id:'address',label:'Address / location'},{id:'lpa',label:'LPA / Borough'},
  {id:'planningRef',label:'Planning reference'},{id:'planningStatus',label:'Planning status'},
  {id:'units',label:'Total units'},{id:'unitMix',label:'Unit mix (e.g. 18 houses, 11 flats)'},{id:'netArea',label:'Net area (sqft)'},{id:'programme',label:'Programme (months)'},{id:'date',label:'Presentation date'},
  {sec:'Location Highlights'},
  {id:'loc1',label:'Highlight 1'},{id:'loc2',label:'Highlight 2'},{id:'loc3',label:'Highlight 3'},{id:'loc4',label:'Highlight 4'},
  {sec:'Financial Summary (£m)'},
  {id:'gdv',label:'GDV'},{id:'land',label:'Land / purchase'},{id:'landAcq',label:'Acquisition costs'},{id:'build',label:'Construction (net)'},{id:'profFees',label:'Professional fees'},{id:'contingency',label:'Contingency'},{id:'sales',label:'Sales & marketing'},{id:'finance',label:'Finance'},{id:'other',label:'Other costs'},{id:'totalCost',label:'Total cost'},{id:'profit',label:'Project profit'},
  {sec:'Key Ratios'},
  {id:'profitPctGdv',label:'Profit % GDV'},{id:'profitExFin',label:'Profit % cost (ex-finance)'},{id:'peakFunding',label:'Peak funding (£m)'},{id:'ltv',label:'LTV (%)'},{id:'ltc',label:'LTC (%)'},
  {sec:'Deal Structure'},
  {id:'equityTotal',label:'Total equity (£m)'},{id:'investorPct',label:'Investor % of equity'},{id:'devPct',label:'Developer % of equity'},{id:'preferredReturn',label:'Preferred return (% pa)'},{id:'profitSplit',label:'Profit split description'},{id:'seniorDebt',label:'Senior debt (£m)'},{id:'seniorRate',label:'Senior rate (% all-in)'},{id:'equityMultiple',label:'Equity multiple (×)'},{id:'irr',label:'Estimated IRR (%)'},{id:'investorProceeds',label:'Total investor proceeds (£m)'},
  {sec:'Contact'},
  {id:'company',label:'Company name'},{id:'email',label:'Email'},{id:'phone',label:'Phone'},{id:'disclaimer',label:'Disclaimer text',textarea:true}
];

function buildPanel(){
  return FIELDS.map(f=>{
    if(f.sec) return `<div class="cfg-sec">${f.sec}</div>`;
    if(f.textarea) return `<div class="cfg-f"><label>${f.label}</label><textarea id="cf_${f.id}">${C[f.id]||''}</textarea></div>`;
    return `<div class="cfg-f"><label>${f.label}</label><input id="cf_${f.id}" value="${(C[f.id]||'').toString().replace(/"/g,'&quot;')}"></div>`;
  }).join('');
}

function toggleCfg(){
  const panel=document.getElementById('cfg');
  const opening=!panel.classList.contains('open');
  if(opening) document.getElementById('cfg-body').innerHTML=buildPanel();
  panel.classList.toggle('open');
}

function saveCfg(){
  FIELDS.filter(f=>f.id).forEach(f=>{ const el=document.getElementById('cf_'+f.id); if(el) C[f.id]=el.value; });
  localStorage.setItem(STORE,JSON.stringify(C));
  render();
  toggleCfg();
  // reinit deck-stage by replacing the element
  const old=document.getElementById('deck');
  const neo=document.createElement('deck-stage');
  neo.setAttribute('id','deck');neo.setAttribute('width','1920');neo.setAttribute('height','1080');
  neo.innerHTML=buildSlides(C);
  old.replaceWith(neo);
  if(window.DeckStage&&neo.connectedCallback) neo.connectedCallback();
}
</script>
</body>
</html>
