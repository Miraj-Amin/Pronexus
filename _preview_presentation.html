<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Audience presentations — preview</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  body { padding: 0; background: var(--bg); }
  .pp-switch { position: sticky; top: 0; z-index: 30; display: flex; gap: 8px; padding: 12px 22px; background: var(--paper); border-bottom: 1px solid var(--paper-border); flex-wrap: wrap; }
  .pp-switch button { font-family: var(--mono); font-size: 12px; font-weight: 600; padding: 7px 14px; border: 1px solid var(--paper-border); background: #fff; color: var(--page-ink); border-radius: 5px; cursor: pointer; }
  .pp-switch button.on { background: var(--page-ink); color: #fff; border-color: var(--page-ink); }
  .pp-stage { padding: 24px 22px 60px; }
  .app.projview.presmode { background: transparent; }
</style>
</head>
<body>
<div class="pp-switch" id="switch"></div>
<div class="pp-stage app projview presmode"><div id="root"></div>
<div id="boot-error" style="display:none;position:fixed;inset:0;z-index:99999;background:#12202f;color:#f6f3ec;font-family:'IBM Plex Mono',monospace;font-size:13px;line-height:1.6;padding:32px;overflow:auto">
  <h1 style="font-size:15px;color:#ffb27a;margin:0 0 12px">⚠ Startup error</h1>
  <div style="color:#9fb0bf">The app hit an error while loading (also in the Console, F12):</div>
  <pre id="boot-error-msg" style="white-space:pre-wrap;color:#e88;background:#0d1926;padding:14px;border-radius:8px;border:1px solid #24384a;margin-top:12px"></pre>
</div>
<script>
(function(){
  function show(m){var b=document.getElementById('boot-error'),p=document.getElementById('boot-error-msg');
    if(b&&p){p.textContent+=(p.textContent?'\n\n':'')+m;b.style.display='block';}}
  window.addEventListener('error',function(e){var m=e&&e.message?e.message:String(e);
    if(e&&e.filename)m+='\n  at '+e.filename+':'+(e.lineno||'?');show(m);});
  window.addEventListener('unhandledrejection',function(e){
    show('Unhandled rejection: '+(e.reason&&e.reason.message?e.reason.message:e.reason));});
  window.addEventListener('load',function(){setTimeout(function(){
    var r=document.getElementById('root');
    if(r&&r.childElementCount===0){
      if(!window.React)show('React did not load — check the CDN <script> tags / your network.');
      else if(!window.ReactDOM)show('ReactDOM did not load.');
      else if(!window.Babel)show('Babel did not load — the .jsx files cannot be compiled.');
      else show('Scripts loaded but nothing rendered. Check the Console for the first red error.');}
  },6000);});
})();
</script></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="engine.js"></script>
<script type="text/babel" src="dashboard.jsx"></script>
<script type="text/babel" src="presentation.jsx"></script>
<script type="text/babel">
  const A = window.Appraisal;
  function withVersion(type, label) {
    const v = A.seedState();
    if (type) v.version = { type, label, parentId: v.id, createdAt: '2026-06-05' };
    return v;
  }
  const AUD = [
    { k: 'Base / internal', s: withVersion(null) },
    { k: 'Investor', s: withVersion('Investor', 'Investor version') },
    { k: 'Bank / Valuer', s: withVersion('Bank / Valuer', 'Bank — stressed') },
    { k: 'Owner / Seller', s: withVersion('Owner / Seller', 'Owner version') }
  ];

  function Harness() {
    const [i, setI] = React.useState(1);
    const st = AUD[i].s;
    const model = React.useMemo(() => A.computeModel(st), [st]);
    React.useEffect(() => {
      const sw = document.getElementById('switch');
      sw.innerHTML = '';
      AUD.forEach((a, idx) => {
        const b = document.createElement('button');
        b.textContent = a.k; b.className = idx === i ? 'on' : '';
        b.onclick = () => setI(idx);
        sw.appendChild(b);
      });
    }, [i]);
    return <window.Presentation state={st} model={model} />;
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Harness />);
</script>
</body>
</html>
